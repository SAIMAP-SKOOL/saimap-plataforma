        /* Flashcard Styles */
        .flashcard-container {
            perspective: 1000px;
        }
        .flashcard {
            width: 100%;
            height: 340px;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .flashcard.flipped {
            transform: rotateY(180deg);
        }
        .flashcard-front, .flashcard-back {
            width: 100%;
            height: 100%;
            position: absolute;
            backface-visibility: hidden;
            border-radius: 1.5rem;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 2.5rem;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.05), 0 2px 4px -2px rgb(0 0 0 / 0.05);
            border: 1px solid #e2e8f0;
        }
        .flashcard-front {
            background-color: #ffffff;
            color: #1e293b;
        }
        .flashcard-back {
            background-color: #f8fafc;
            color: #1e293b;
            transform: rotateY(180deg);
            overflow-y: auto;
        }
        .animate-slide-down {
            animation: slideDown 0.25s ease-out forwards;
        }
        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        // Generar hash SHA-256 de forma nativa en el navegador
        async function sha256(message) {
            const msgBuffer = new TextEncoder().encode(message.trim().toLowerCase());
            const hashBuffer = await crypto.subtle.digest('SHA-256', msgBuffer);
            const hashArray = Array.from(new Uint8Array(hashBuffer));
            return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
        }

        // Consultar la API REST de Google Firestore para verificar si el hash está en la whitelist
        async function validateEmail(email) {
            if (!email) return false;
            try {
                const hash = await sha256(email);
                const url = `https://firestore.googleapis.com/v1/projects/${FIREBASE_PROJECT_ID}/databases/(default)/documents/whitelist/${hash}`;
                const response = await fetch(url);
                if (response.ok) {
                    return true;
                } else if (response.status === 404) {
                    return false;
                } else {
                    throw new Error('Servicio de autenticación no disponible');
                }
            } catch (error) {
                console.error('Error de autenticación:', error);
                throw error;
            }
        }

        // Sincronizar datos del usuario con Google Firestore
        async function syncUserData(action = 'load') {
            if (!authState.isAuthenticated || !authState.email) return;

            try {
                const emailHash = await sha256(authState.email);
                const docUrl = `https://firestore.googleapis.com/v1/projects/${FIREBASE_PROJECT_ID}/databases/(default)/documents/users/${emailHash}`;

                if (action === 'load') {
                    const response = await fetch(docUrl);
                    if (response.ok) {
                        const data = await response.json();
                        const fields = data.fields || {};

                        let needsSave = false;

                        // 1. Favoritos (Array)
                        let remoteFavs = [];
                        if (fields.favorites && fields.favorites.arrayValue && fields.favorites.arrayValue.values) {
                            remoteFavs = fields.favorites.arrayValue.values.map(v => v.stringValue).filter(Boolean);
                        }
                        const localFavs = JSON.parse(localStorage.getItem('saimap_favorites')) || [];
                        const mergedFavs = Array.from(new Set([...localFavs, ...remoteFavs]));
                        state.favorites = mergedFavs;
                        localStorage.setItem('saimap_favorites', JSON.stringify(mergedFavs));
                        if (localFavs.some(f => !remoteFavs.includes(f))) {
                            needsSave = true;
                        }

                        // 2. Logros (Array)
                        let remoteAch = [];
                        if (fields.achievements && fields.achievements.arrayValue && fields.achievements.arrayValue.values) {
                            remoteAch = fields.achievements.arrayValue.values.map(v => v.stringValue).filter(Boolean);
                        }
                        const localAch = JSON.parse(localStorage.getItem('saimap_achievements')) || [];
                        const mergedAch = Array.from(new Set([...localAch, ...remoteAch]));
                        state.achievements = mergedAch;
                        localStorage.setItem('saimap_achievements', JSON.stringify(mergedAch));
                        if (localAch.some(a => !remoteAch.includes(a))) {
                            needsSave = true;
                        }

                        // 3. Tareas del Planificador (JSON string)
                        let remoteTasks = [];
                        if (fields.plannerTasks && fields.plannerTasks.stringValue) {
                            try {
                                remoteTasks = JSON.parse(fields.plannerTasks.stringValue) || [];
                            } catch (e) {
                                console.error('Error parsing remote planner tasks:', e);
                            }
                        }
                        const localTasks = JSON.parse(localStorage.getItem('saimap_planner_tasks')) || [];
                        const tasksMap = new Map();
                        localTasks.forEach(t => tasksMap.set(t.id, t));
                        remoteTasks.forEach(t => {
                            if (!tasksMap.has(t.id)) {
                                tasksMap.set(t.id, t);
                            } else {
                                const localTask = tasksMap.get(t.id);
                                if (t.completed && !localTask.completed) {
                                    tasksMap.set(t.id, t);
                                }
                            }
                        });
                        const mergedTasks = Array.from(tasksMap.values());
                        state.plannerTasks = mergedTasks;
                        localStorage.setItem('saimap_planner_tasks', JSON.stringify(mergedTasks));
                        
                        if (localTasks.some(t => !remoteTasks.some(rt => rt.id === t.id))) {
                            needsSave = true;
                        } else {
                            const remoteCompletedIds = new Set(remoteTasks.filter(t => t.completed).map(t => t.id));
                            const localCompletedButRemoteNot = localTasks.some(t => t.completed && !remoteCompletedIds.has(t.id));
                            if (localCompletedButRemoteNot) {
                                needsSave = true;
                            }
                        }

                        // 4. Foco semanal (String)
                        let remoteFocus = '';
                        if (fields.weeklyFocus && fields.weeklyFocus.stringValue) {
                            remoteFocus = fields.weeklyFocus.stringValue;
                        }
                        const localFocus = localStorage.getItem('saimap_weekly_focus') || '';
                        const mergedFocus = localFocus || remoteFocus;
                        state.weeklyFocus = mergedFocus;
                        localStorage.setItem('saimap_weekly_focus', mergedFocus);
                        if (localFocus && localFocus !== remoteFocus) {
                            needsSave = true;
                        }

                        // 5. Preguntas vistas (JSON string)
                        if (fields.seenQuestions && fields.seenQuestions.stringValue) {
                            try {
                                const remote = JSON.parse(fields.seenQuestions.stringValue);
                                // Merge: unión de vistos locales y remotos
                                for (const subId in remote) {
                                    const localSeen = new Set(userQuestionData.seenQuestions[subId] || []);
                                    remote[subId].forEach(id => localSeen.add(id));
                                    userQuestionData.seenQuestions[subId] = [...localSeen];
                                }
                            } catch(e) { console.warn('seenQuestions parse error', e); }
                        }

                        // 6. Estadísticas Anki (JSON string)
                        if (fields.questionStats && fields.questionStats.stringValue) {
                            try {
                                const remote = JSON.parse(fields.questionStats.stringValue);
                                for (const subId in remote) {
                                    if (!userQuestionData.questionStats[subId]) userQuestionData.questionStats[subId] = {};
                                    Object.assign(userQuestionData.questionStats[subId], remote[subId]);
                                }
                            } catch(e) { console.warn('questionStats parse error', e); }
                        }

                        // 7. Estado maratón (JSON string)
                        if (fields.marathonState && fields.marathonState.stringValue) {
                            try {
                                const remote = JSON.parse(fields.marathonState.stringValue);
                                Object.assign(userQuestionData.marathonState, remote);
                            } catch(e) { console.warn('marathonState parse error', e); }
                        }

                        render();

                        // Si detectamos cambios locales que no estaban en la nube, sincronizamos de vuelta
                        if (needsSave) {
                            console.log('Local modifications merged, syncing back to Firestore...');
                            await syncUserData('save');
                        }
                    } else if (response.status === 404) {
                        console.log('No user data found in Firestore, creating document...');
                        await syncUserData('save');
                    }
                } else if (action === 'save') {
                    const localFavs = state.favorites || [];
                    const localAch = state.achievements || [];
                    const localTasks = state.plannerTasks || [];
                    const localFocus = state.weeklyFocus || '';

                    const payload = {
                        fields: {
                            favorites: {
                                arrayValue: {
                                    values: localFavs.map(f => ({ stringValue: f }))
                                }
                            },
                            achievements: {
                                arrayValue: {
                                    values: localAch.map(a => ({ stringValue: a }))
                                }
                            },
                            plannerTasks: {
                                stringValue: JSON.stringify(localTasks)
                            },
                            weeklyFocus: {
                                stringValue: localFocus
                            },
                            seenQuestions: {
                                stringValue: JSON.stringify(userQuestionData.seenQuestions)
                            },
                            questionStats: {
                                stringValue: JSON.stringify(userQuestionData.questionStats)
                            },
                            marathonState: {
                                stringValue: JSON.stringify(userQuestionData.marathonState)
                            }
                        }
                    };

                    const updateMaskQuery = 'updateMask.fieldPaths=favorites&updateMask.fieldPaths=achievements&updateMask.fieldPaths=plannerTasks&updateMask.fieldPaths=weeklyFocus&updateMask.fieldPaths=seenQuestions&updateMask.fieldPaths=questionStats&updateMask.fieldPaths=marathonState';
                    const patchUrl = `${docUrl}?${updateMaskQuery}`;

                    const response = await fetch(patchUrl, {
                        method: 'PATCH',
                        headers: {
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify(payload)
                    });

                    if (!response.ok) {
                        const errMsg = await response.text();
                        console.error('Failed to sync user data to Firestore:', errMsg);
                    } else {
                        console.log('User data successfully synchronized to Firestore');
                    }
                }
            } catch (err) {
                console.error('Error during Firestore sync:', err);
            }
        }

        async function loadCustomThemes(subjectId, folder, year, shortId, themesList) {
            const promises = themesList.map(t => {
                const temaFilePart = String(t).replace(/\./g, '-');
                const url = `json/${year}/${folder}/${subjectId}-tema-${temaFilePart}.json`;
                return fetch(url).then(res => {
                    if (!res.ok) throw new Error(`Error al cargar el tema ${t}`);
                    return res.json();
                });
            });

            try {
                const results = await Promise.all(promises);
                
                let mergedQuiz = [];
                let mergedTrainer = [];
                let mergedFlashcards = [];

                results.forEach(data => {
                    if (data.jsonTestA) {
                        // Statistics format
                        mergedQuiz.push(...(data.jsonTestA || []));
                        mergedQuiz.push(...(data.jsonTestB || []));
                    } else {
                        // Standard format
                        mergedQuiz.push(...(data.quiz || []));
                        mergedTrainer.push(...(data.trainer || []));
                        mergedFlashcards.push(...(data.flashcards || []));
                    }
                });

                const combinedData = {
                    quiz: mergedQuiz,
                    trainer: mergedTrainer,
                    flashcards: mergedFlashcards
                };

                const sub = AVAILABLE_SUBJECTS.find(s => s.id === subjectId);
                const cleanThemes = themesList.map(t => String(t).replace(/-/g, '.')).sort((a,b) => {
                    const aParts = a.split('.').map(Number);
                    const bParts = b.split('.').map(Number);
                    for (let i = 0; i < Math.max(aParts.length, bParts.length); i++) {
                        const pa = aParts[i] !== undefined ? aParts[i] : 0;
                        const pb = bParts[i] !== undefined ? bParts[i] : 0;
                        if (pa !== pb) return pa - pb;
                    }
                    return 0;
                });
                subjectName = `${sub ? sub.name : 'Asignatura'} - Temas: ${cleanThemes.join(', ')}`;
                
                initQuestions(combinedData);
            } catch (err) {
                console.error(err);
                alert("Error cargando los temas seleccionados: " + err.message);
            }
        }

        function initQuestions(data) {
            state.trainerQuestions = [];
            state.flashcardQuestions = [];
            state.hasTrainer = false;
            state.hasFlashcards = false;
            state.studyMode = 'test'; 

            let questions = [];

            if (data && typeof data === 'object' && !Array.isArray(data)) {
                if (Array.isArray(data.quiz)) {
                    questions = data.quiz;
                }
                if (Array.isArray(data.trainer)) {
                    state.trainerQuestions = data.trainer;
                    state.hasTrainer = true;
                }
                if (Array.isArray(data.flashcards)) {
                    state.flashcardQuestions = data.flashcards;
                    state.hasFlashcards = true;
                }
            } else if (Array.isArray(data)) {
                if (data.length > 0) {
                    if (Array.isArray(data[0])) {
                        questions = data.map(q => {
                            let questionText = q[0];
                            let correctIndex = -1;
                            let options = q.slice(1).map((optText, optIdx) => {
                                if (optText.includes('(correcta)')) {
                                    correctIndex = optIdx;
                                    return optText.replace(/\s*\(correcta\)/i, '').trim();
                                }
                                return optText;
                            });
                            if (correctIndex === -1) {
                                correctIndex = 0; 
                            }
                            return {
                                q: questionText,
                                options: options,
                                correct: correctIndex
                            };
                        });
                    } else {
                        questions = data;
                    }
                }
            }

            ALL_QUESTIONS = questions.map((item, idx) => {
                const normQ = item.q || item.question || '';
                const normCorrect = item.correct !== undefined ? item.correct : (item.correctIndex !== undefined ? item.correctIndex : 0);
                return {
                    ...item,
                    id: idx + 1,
                    q: normQ,
                    correct: normCorrect
                };
            });
            state.gameState = 'menu';
            state.questionCount = Math.min(30, ALL_QUESTIONS.length);
            render();
        }

        const shuffleArray = (array) => {
            const newArray = [...array];
            for (let i = newArray.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [newArray[i], newArray[j]] = [newArray[j], newArray[i]];
            }
            return newArray;
        };

        // --- MÉTODOS DEL JUEGO ---
        // --- SELECCIÓN INTELIGENTE DE PREGUNTAS (Anti-repetición + Anki) ---
        function getSmartQuestions(count) {
            const subId = state.selectedSubjectId || '__global__';
            const seen = new Set(userQuestionData.seenQuestions[subId] || []);
            const stats = userQuestionData.questionStats[subId] || {};
            const now = Date.now();

            // Categoría 1: No vistas nunca → máxima prioridad (barajadas)
            const unseen = shuffleArray(ALL_QUESTIONS.filter(q => !seen.has(q.id)));

            // Categoría 2: Vistas y con revisión pendiente según Anki
            const dueForReview = shuffleArray(
                ALL_QUESTIONS.filter(q => seen.has(q.id) && (!stats[q.id] || stats[q.id].nextReview <= now))
            );

            // Categoría 3: Vistas y Anki dice que aún no toca revisarlas
            const notDueYet = shuffleArray(
                ALL_QUESTIONS.filter(q => seen.has(q.id) && stats[q.id] && stats[q.id].nextReview > now)
            );

            // Ordenar cat. 3 por las más falladas primero (mayor ratio de fallos)
            notDueYet.sort((a, b) => {
                const rA = stats[a.id] ? (stats[a.id].wrong || 0) / Math.max((stats[a.id].correct || 0) + (stats[a.id].wrong || 0), 1) : 0;
                const rB = stats[b.id] ? (stats[b.id].wrong || 0) / Math.max((stats[b.id].correct || 0) + (stats[b.id].wrong || 0), 1) : 0;
                return rB - rA;
            });

            const pool = [...unseen, ...dueForReview, ...notDueYet];
            return pool.slice(0, count);
        }

        const appMethods = {

                const subId = state.selectedSubjectId || '__global__';

                let remainingIds;

                    const seen = new Set(userQuestionData.seenQuestions[subId] || []);

                    remainingIds = [...unseen, ...seenArr].map(q => q.id);
                }
                userQuestionData.marathonState[subId] = { remainingIds: [...remainingIds], done: ALL_QUESTIONS.length - remainingIds.length };

                // Tomar las primeras 30 para este bloque
                const batchIds = remainingIds.slice(0, 30);
                const qMap = new Map(ALL_QUESTIONS.map(q => [q.id, q]));
                const selected = batchIds.map(id => qMap.get(id)).filter(Boolean);

                state.mode = 'sim';
                state.isMarathon = true;
                state.activeQuestions = selected.map(q => {
                    let opts = q.options.map((text, idx) => ({ text, isCorrect: idx === q.correct }));
                    let shuffledOpts = shuffleArray(opts);
                    return {
                        ...q,
                        options: shuffledOpts.map(o => o.text),
                        correctIndex: shuffledOpts.findIndex(o => o.isCorrect)
                    };
                });

                state.gameState = 'playing';
                state.currentIndex = 0;
                state.userAnswers = {};
                state.simFeedback = null;
                state.hiddenOptions = [];
                state.timeSpentSeconds = 0;
                if(state.playInterval) clearInterval(state.playInterval);
                state.playInterval = setInterval(() => { state.timeSpentSeconds++; }, 1000);
                render();
            },
            handleAnswer: (optionIndex) => {
                const currentQ = state.activeQuestions[state.currentIndex];
                if (state.mode === 'sim' && state.simFeedback) return;
                
                const isCorrect = optionIndex === currentQ.correctIndex;
                if (state.mode === 'sim') {
                    state.simFeedback = { isCorrect, selected: optionIndex };
                }
                state.userAnswers[currentQ.id] = optionIndex;

                // --- ANKI: actualizar estadísticas de la pregunta ---
                const subId = state.selectedSubjectId || '__global__';
                const qId = currentQ.id;
                if (!userQuestionData.questionStats[subId]) userQuestionData.questionStats[subId] = {};
                const qs = userQuestionData.questionStats[subId][qId] || { correct: 0, wrong: 0, nextReview: 0 };
                if (isCorrect) {
                    qs.correct = (qs.correct || 0) + 1;
                    // Backoff exponencial: 2^correct días (máx 64 días)
                    const days = Math.min(Math.pow(2, qs.correct), 64);
                    qs.nextReview = Date.now() + days * 86400000;
                } else {
                    qs.wrong = (qs.wrong || 0) + 1;
                    qs.nextReview = Date.now() + 3600000; // 1h para las falladas
                }
                qs.lastSeen = Date.now();
                userQuestionData.questionStats[subId][qId] = qs;

                render();
            },
            nextQuestion: () => {
                if (state.currentIndex < state.activeQuestions.length - 1) {
                    state.currentIndex++;
                    state.simFeedback = null;

                // --- MARCAR PREGUNTAS COMO VISTAS (anti-repetición) ---
                const subId = state.selectedSubjectId || '__global__';

                state.activeQuestions.forEach(q => seenSet.add(q.id));

                // --- ACTUALIZAR ESTADO DEL MARATÓN ---
                if (state.isMarathon) {

                    if (ms && ms.remainingIds) {

        function resolveAchievementDetails(id) {
            if (id.startsWith('medal_')) {
                let medalType = '';
                let questionsCount = 0;
                let baseId = '';
                
                if (id.startsWith('medal_bronze_')) {
                    medalType = 'bronze';
                    questionsCount = 30;
                    baseId = 'medal_bronze';
                } else if (id.startsWith('medal_silver_')) {
                    medalType = 'silver';
                    questionsCount = 75;
                    baseId = 'medal_silver';
                } else if (id.startsWith('medal_gold_')) {
                    medalType = 'gold';
                    questionsCount = 150;
                    baseId = 'medal_gold';
                } else if (id.startsWith('medal_platinum_')) {
                    medalType = 'platinum';
                    questionsCount = 300;
                    baseId = 'medal_platinum';
                }

                if (baseId) {
                    const subjectId = id.substring(baseId.length + 1);
                    const subject = AVAILABLE_SUBJECTS.find(s => s.id === subjectId);
                    const subjectName = subject ? subject.name : 'Asignatura';
                    
                    let medalName = '';
                    if (medalType === 'bronze') medalName = 'Medalla de Bronce';
                    else if (medalType === 'silver') medalName = 'Medalla de Plata';
                    else if (medalType === 'gold') medalName = 'Medalla de Oro';
                    else if (medalType === 'platinum') medalName = 'Medalla de Platino';

                    return {

        const calculateScore = () => {
            let correct = 0, incorrect = 0, blank = 0;
            state.activeQuestions.forEach(q => {
                const ans = state.userAnswers[q.id];
                if (ans === undefined) blank++;
                else if (ans === q.correctIndex) correct++;
                else incorrect++;
            });
            const score = (correct * 1) - (incorrect * 0.5);
            return { correct, incorrect, blank, score: Math.max(0, score) };
        };

        // --- HELPERS PARA EL PLANIFICADOR ---
        function getMonday(d) {
            const date = new Date(d);
            const day = date.getDay();
            const diff = date.getDate() - day + (day === 0 ? -6 : 1);
            const monday = new Date(date.setDate(diff));
            monday.setHours(0,0,0,0);
            return monday;
        }

        function formatDateStr(date) {
            const y = date.getFullYear();
            const m = String(date.getMonth() + 1).padStart(2, '0');
            const d = String(date.getDate()).padStart(2, '0');
            return `${y}-${m}-${d}`;
        }

        function isDateInWeek(dateStr, monday) {
            const d = new Date(dateStr + 'T00:00:00');
            const m = new Date(monday);
            const sunday = new Date(m);
            sunday.setDate(sunday.getDate() + 6);
            sunday.setHours(23,59,59,999);
            return d >= m && d <= sunday;
        }

        function getTestCategory(test) {
            const cat = test.category;
            if (cat === 'Inteligencia y Cognición' || cat === 'Educativo y del Desarrollo') {
                return 'Inteligencia y Desarrollo';
            }
            if (cat === 'Personalidad y Clínica') {
                return 'Personalidad y Clínicos';
            }
            if (cat === 'Neuropsicología') {
                return 'Neuropsicología';
            }
            return 'Otros';
        }

        function renderGlossary() {
            const isGuest = !authState.isAuthenticated;
            const allTests = PSYCHOMETRIC_TESTS_DB || [];
            
            // Filtrado de la lista
            const query = (state.glossarySearch || '').trim().toLowerCase();
            const catFilter = state.glossaryCategory || 'all';
            
            let filtered = allTests;
            if (query) {
                filtered = filtered.filter(test => {
                    const acr = (test.acronym || '').toLowerCase();
                    const name = (test.name || '').toLowerCase();
                    const obj = (test.objective || '').toLowerCase();
                    const utility = (test.clinical_utility || '').toLowerCase();
                    return acr.includes(query) || name.includes(query) || obj.includes(query) || utility.includes(query);
                });
            }
            if (catFilter !== 'all') {
                filtered = filtered.filter(test => getTestCategory(test) === catFilter);
            }

            // Categorías de badges
            const categories = [

                { id: 'Inteligencia y Desarrollo', name: 'Inteligencia y Desarrollo' },

                                <span class="text-sm text-slate-500">/ ${pool.length} aciertos</span>

                                <button onclick="appMethods.restartGlossaryQuiz();" class="flex-1 py-3 bg-indigo-600 hover:bg-indigo-700 text-white rounded-xl font-bold text-xs shadow-md transition-all flex items-center justify-center gap-2 cursor-pointer">
                                    <i data-lucide="rotate-ccw" class="w-4 h-4"></i> Volver a jugar
                                </button>
                                <button onclick="appMethods.stopGlossaryQuiz();" class="flex-1 py-3 bg-slate-800 hover:bg-slate-700 text-slate-300 border border-slate-700/50 rounded-xl font-bold text-xs transition-all flex items-center justify-center gap-2 cursor-pointer">
                                    Finalizar
                                </button>
                            </div>
                        </div>
                    `;

                            </div>
                        </div>
                    `;
                }
            } else {
                // Panel de inicio del quiz
                rightPanelHTML = `
                    <div class="bg-gradient-to-br from-slate-900 via-indigo-950/20 to-slate-900 border border-slate-800 rounded-3xl p-8 text-center flex flex-col items-center justify-center space-y-6 shadow-xl fade-in min-h-[450px]">

        function renderSelector() {
            const history = getHistory();
            const unlocked = getUnlockedData();
            const unlockedIds = Object.keys(unlocked);
            
            // Estadísticas generales
            const totalTests = history.length;
            const avgScore = totalTests > 0 
                ? (history.reduce((acc, curr) => acc + (curr.score / curr.total * 10), 0) / totalTests).toFixed(1)
                : "0.0";
            const passRate = totalTests > 0
                ? Math.round((history.filter(h => (h.score / h.total) >= 0.5).length / totalTests) * 100)
                : 0;

            // Render de Asignaturas Desbloqueadas
            let unlockedSectionHTML = '';
            
            // Filtrar asignaturas desbloqueadas por curso o favoritas
            const filteredUnlockedIds = unlockedIds.filter(id => {
                const s = AVAILABLE_SUBJECTS.find(sub => sub.id === id);
                if (!s) return false;
                if (state.filterYear === 'Favoritas') {
                    return state.favorites.includes(id);
                }
                const year = s.year || '1º';
                return state.filterYear === 'Todos' || year === state.filterYear;
            });

            // Ordenar favoritos primero (excepto cuando ya filtramos solo por favoritas)
            if (state.filterYear !== 'Favoritas') {
                filteredUnlockedIds.sort((a, b) => {
                    const aFav = state.favorites.includes(a);
                    const bFav = state.favorites.includes(b);
                    if (aFav && !bFav) return -1;
                    if (!aFav && bFav) return 1;
                    return 0;
                });
            }

            if (filteredUnlockedIds.length === 0) {

        // Menú de configuración del Test
        function renderMenu() {
            const availableQuestions = ALL_QUESTIONS.length;
            const buttons = [30, 75, 150, 300].filter(n => n <= availableQuestions || n === 30);
            
            const countButtonsHTML = buttons.map(n => `
                <button onclick="appMethods.setQuestionCount(${n})" 
                    class="py-3 rounded-xl font-bold transition-all border-2 ${state.questionCount === n ? 'bg-indigo-50 border-indigo-600 text-indigo-700' : 'bg-slate-50 border-slate-100 text-slate-400 hover:bg-slate-100'}">
                    ${n}
                </button>`).join('');

            let modeTabsHTML = '';
            if (state.hasTrainer || state.hasFlashcards) {
                modeTabsHTML = `
                    <div class="flex border border-slate-150 mb-6 bg-slate-50 p-1 rounded-xl">
                        <button onclick="appMethods.setStudyMode('test')" 
                            class="flex-grow py-2.5 px-4 rounded-lg font-bold text-xs transition-all flex items-center justify-center gap-2 ${state.studyMode === 'test' ? 'bg-white text-indigo-600 shadow-sm border border-slate-200/50' : 'text-slate-400 hover:text-slate-600'}">
                            <i data-lucide="list-checks" class="w-4 h-4"></i> Test de Examen
                        </button>
                        ${state.hasTrainer ? `
                        <button onclick="appMethods.setStudyMode('trainer')" 
                            class="flex-grow py-2.5 px-4 rounded-lg font-bold text-xs transition-all flex items-center justify-center gap-2 ${state.studyMode === 'trainer' ? 'bg-white text-indigo-600 shadow-sm border border-slate-200/50' : 'text-slate-400 hover:text-slate-600'}">
                            <i data-lucide="graduation-cap" class="w-4 h-4"></i> Entrenador
                        </button>
                        ` : ''}
                        ${state.hasFlashcards ? `
                        <button onclick="appMethods.setStudyMode('flashcards')" 
                            class="flex-grow py-2.5 px-4 rounded-lg font-bold text-xs transition-all flex items-center justify-center gap-2 ${state.studyMode === 'flashcards' ? 'bg-white text-indigo-600 shadow-sm border border-slate-200/50' : 'text-slate-400 hover:text-slate-600'}">
                            <i data-lucide="copy" class="w-4 h-4"></i> Fichas
                        </button>
                        ` : ''}
                    </div>
                `;
            }

            let menuContentHTML = '';
            if (state.studyMode === 'test') {
                // --- INDICADOR DE COBERTURA DEL BANCO ---
                const subId = state.selectedSubjectId || '__global__';
                const totalQ = ALL_QUESTIONS.length;
                const seenCount = (userQuestionData.seenQuestions[subId] || []).length;
                const seenPct = totalQ > 0 ? Math.round((seenCount / totalQ) * 100) : 0;
                const seenColor = seenPct < 30 ? 'bg-red-400' : seenPct < 70 ? 'bg-amber-400' : 'bg-green-500';

                // --- MARATÓN: estado actual ---
                const ms = userQuestionData.marathonState[subId];
                const marathonRemaining = ms && ms.remainingIds ? ms.remainingIds.length : totalQ;

        // Ejecución del Examen

                    </div>

                    <div class="w-full max-w-5xl bg-white rounded-3xl shadow-sm border border-slate-200 p-8 md:p-10 mb-6 relative">
                        <h2 class="text-lg md:text-xl font-bold text-slate-800 mb-8 leading-relaxed">${currentQ.question || currentQ.q}</h2>
                        
                        <div class="space-y-3">
                            ${currentQ.options.map((option, idx) => {
                                if (state.hiddenOptions.includes(idx)) return ''; 

                                let statusClass = "border-slate-100 bg-slate-50 text-slate-600 hover:border-slate-300 hover:bg-white";
                                let iconContent = String.fromCharCode(65 + idx);
                                let iconClass = "bg-white border-slate-200 text-slate-400";

                                if (isSim && state.simFeedback) {
                                    if (idx === currentQ.correctIndex) {
                                        statusClass = "correct-bg border-green-500 ring-1 ring-green-500";
                                        iconClass = "bg-green-500 text-white border-green-500";
                                        iconContent = `<i data-lucide="check" class="w-4 h-4"></i>`;
                                    } else if (state.simFeedback.selected === idx) {
                                        statusClass = "wrong-bg border-red-500";
                                        iconClass = "bg-red-500 text-white border-red-500";
                                        iconContent = `<i data-lucide="x" class="w-4 h-4"></i>`;
                                    } else {
                                        statusClass = "opacity-40 border-transparent bg-transparent";
                                    }
                                } else if (!isSim && state.userAnswers[currentQ.id] === idx) {
                                    statusClass = "bg-slate-800 border-slate-800 text-white shadow-lg shadow-slate-200";
                                    iconClass = "bg-white/20 text-white border-transparent";
                                }

                                return `
                                <button onclick="appMethods.handleAnswer(${idx})" ${(isSim && state.simFeedback) ? 'disabled' : ''} 
                                    class="w-full text-left p-4 rounded-xl border-2 transition-all duration-200 flex items-start gap-4 font-medium group ${statusClass}">
                                    <div class="w-8 h-8 rounded-lg border-2 flex-shrink-0 flex items-center justify-center text-xs font-bold transition-colors ${iconClass}">

                                    </div>
                                    <span class="mt-0.5 leading-snug">${option}</span>

                        ${isSim && state.simFeedback && currentQ.explanation ? `

                                ${currentQ.explanation}

                    <div class="w-full max-w-5xl flex justify-between items-center gap-4">
                        <button onclick="appMethods.prevQuestion()" ${(state.currentIndex === 0) ? 'disabled' : ''} 
                            class="flex items-center gap-2 px-5 py-3 rounded-xl font-bold transition-all text-sm ${(state.currentIndex === 0) ? 'opacity-0' : 'text-slate-400 hover:text-slate-600 hover:bg-slate-100'}">
                            <i data-lucide="arrow-left" class="w-4 h-4"></i> Anterior
                        </button>
                        
                        <div class="flex gap-2">
                             ${(isSim && !state.simFeedback) ? `
                                <button onclick="appMethods.useHint()" ${state.hiddenOptions.length > 0 ? 'disabled' : ''} 
                                    class="flex items-center gap-2 px-4 py-3 text-amber-500 font-bold rounded-xl hover:bg-amber-50 transition-all text-sm ${state.hiddenOptions.length > 0 ? 'opacity-30 grayscale' : ''}">

        // Resultados del Examen
        function renderFinished() {
            const { correct, incorrect, blank, score } = calculateScore();
            const max = state.activeQuestions.length;
            const passed = (score / max) >= 0.5;

            const isExam = state.mode === 'exam';
            let explanationsHTML = '';
            
            if (isExam) {
                explanationsHTML = `
                <div class="mt-8 border-t border-slate-100 pt-8 text-left w-full max-h-[30rem] overflow-y-auto pr-2">
                    <h3 class="font-bold text-slate-800 mb-4">Revisión de Respuestas:</h3>
                    <div class="space-y-6">
                        ${state.activeQuestions.map((q, i) => {
                            const ans = state.userAnswers[q.id];
                            const isCorrect = ans === q.correctIndex;
                            const isBlank = ans === undefined;
                            
                            return `
                            <div class="p-4 rounded-xl border ${isCorrect ? 'border-green-200 bg-green-50' : (isBlank ? 'border-slate-200 bg-slate-50' : 'border-red-200 bg-red-50')}">
                                <div class="font-bold text-sm mb-2">${i+1}. ${q.question || q.q}</div>
                                <div class="text-xs mb-2">Tu respuesta: ${isBlank ? 'En blanco' : q.options[ans]} ${isCorrect ? '✅' : '❌'}</div>
                                ${!isCorrect && !isBlank ? `<div class="text-xs font-semibold text-green-700 mb-2">Correcta: ${q.options[q.correctIndex]}</div>` : ''}
                                ${q.explanation ? `<div class="text-xs text-slate-600 mt-2 pt-2 border-t border-slate-200"><strong>Explicación:</strong> ${q.explanation}</div>` : ''}
                            </div>
                            `
                        }).join('')}
                    </div>
                </div>`;
            }

            return `
                <div class="p-6 flex-grow flex items-center justify-center fade-in">
                    <div class="max-w-5xl w-full bg-white rounded-3xl shadow-xl overflow-hidden border border-slate-100 relative">
                        <div class="${passed ? 'bg-emerald-500' : 'bg-rose-500'} p-10 text-white text-center relative overflow-hidden">
                            <div class="relative z-10">
                                <div class="w-20 h-20 bg-white/20 rounded-full flex items-center justify-center mx-auto mb-4 backdrop-blur-sm">
                                    <i data-lucide="${passed ? 'trophy' : 'alert-circle'}" class="w-10 h-10 text-white"></i>
                                </div>
                                <h2 class="text-3xl font-black mb-1">${passed ? '¡Aprobado!' : 'No superado'}</h2>
                                <p class="text-white/80 font-medium text-sm">${subjectName}</p>
                            </div>
                        </div>

                        <div class="grid grid-cols-3 divide-x divide-slate-100 border-b border-slate-100">
                            <div class="p-6 text-center">
                                <div class="text-2xl font-black text-emerald-500 mb-1">${correct}</div>
                                <div class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Aciertos</div>
                            </div>
                            <div class="p-6 text-center">
                                <div class="text-2xl font-black text-rose-500 mb-1">${incorrect}</div>
                                <div class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Fallos</div>
                            </div>
                            <div class="p-6 text-center">
                                <div class="text-2xl font-black text-slate-400 mb-1">${blank}</div>
                                <div class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Blancos</div>
                            </div>
                        </div>

                        <div class="p-8 text-center bg-slate-50">
                            <div class="text-xs text-slate-400 font-bold uppercase tracking-widest mb-2">Puntuación Global</div>

                        </div>
                        
                        ${isExam ? `<div class="px-8 pb-4">${explanationsHTML}</div>` : ''}

                            </button>

                                <i data-lucide="log-out" class="w-4 h-4"></i> Salir
                            </button>

                    </div>
                </div>

        }

        function cleanText(str) {
            if (!str) return '';
            return str
                .toLowerCase()
                .normalize("NFD")
                .replace(/[\u0300-\u036f]/g, "")
                .replace(/[.,\/#!$%\^&\*;:{}=\-_`~()¡?¿]/g,"")
                .replace(/\s+/g, ' ')
                .trim();
        }

        function checkKeywordPresent(userAns, keyword) {
            if (!userAns) return false;
            const userClean = cleanText(userAns);
            const keywordClean = cleanText(keyword);
            return userClean.includes(keywordClean);
        }

        function renderTrainerPlaying() {
            const currentQ = state.activeQuestions[state.currentIndex];
            const progress = ((state.currentIndex + 1) / state.activeQuestions.length) * 100;

                    return `

                }).join('');

                explanationHTML = `

                                MEMORIA ACTIVA
                            </span>

                    </div>

                    <div class="w-full max-w-5xl h-1.5 bg-slate-100 rounded-full mb-8 overflow-hidden">

                        <div class="space-y-3">

                            <textarea id="trainer-textarea"

                                ${isChecked ? 'disabled' : ''} 
                                placeholder="Escribe aquí tu respuesta. Intenta incluir los conceptos más importantes..." 
                                class="w-full h-32 p-4 border border-slate-200 rounded-2xl text-slate-700 text-sm focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 outline-none resize-none transition-all ${isChecked ? 'bg-slate-50 text-slate-500 border-slate-150' : 'bg-white'}"
                            >${userAns}</textarea>

        function render() {
            const app = document.getElementById('app');
            
            if (state.gameState === 'select') {
                app.innerHTML = renderSelector();
            } else if (state.gameState === 'subject_folder') {
                app.innerHTML = renderSubjectFolder();
            } else if (state.gameState === 'menu') {
                app.innerHTML = renderMenu();
            } else if (state.gameState === 'playing') {
                if (state.studyMode === 'trainer') {
                    app.innerHTML = renderTrainerPlaying();
                } else if (state.studyMode === 'flashcards') {
                    app.innerHTML = renderFlashcardsPlaying();
                } else {
                    app.innerHTML = renderPlaying();
                }
            } else if (state.gameState === 'finished') {
                if (state.studyMode === 'trainer') {
                    app.innerHTML = renderTrainerFinished();
                } else {
                    app.innerHTML = renderFinished();
                }
            } else if (state.gameState === 'planner') {
                app.innerHTML = renderPlanner();
            } else if (state.gameState === 'achievements') {
                app.innerHTML = renderAchievements();
            } else if (state.gameState === 'brain3d') {
                app.innerHTML = renderBrain3D();
                setTimeout(initBrain3D, 50);
            } else if (state.gameState === 'glossary') {
                app.innerHTML = renderGlossary();
            }

            if (state.showPromoModal) {
                app.insertAdjacentHTML('beforeend', renderPromoModalHTML());
            }
            if (state.showLoginModal) {
                app.insertAdjacentHTML('beforeend', renderLoginModalHTML());
            }

            lucide.createIcons();
            if (window.MathJax && window.MathJax.typesetPromise) {
                MathJax.typesetClear([app]);
