        // Generar hash SHA-256 de forma nativa en el navegador
        async function sha256(message) {
            const msgBuffer = new TextEncoder().encode(message.trim().toLowerCase());
            const hashBuffer = await crypto.subtle.digest('SHA-256', msgBuffer);
            const hashArray = Array.from(new Uint8Array(hashBuffer));
            return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
        }

        // Consultar la API REST de Google Firestore para verificar si el hash está en la whitelist
        async function validateEmail(email) {
            if (!email) return false;
            try {
                const hash = await sha256(email);
                const url = `https://firestore.googleapis.com/v1/projects/${FIREBASE_PROJECT_ID}/databases/(default)/documents/whitelist/${hash}`;
                const response = await fetch(url);
                if (response.ok) {
                    return true;
                } else if (response.status === 404) {
                    return false;
                } else {
                    throw new Error('Servicio de autenticación no disponible');
                }
            } catch (error) {
                console.error('Error de autenticación:', error);
                throw error;
            }
        }

        // Sincronizar datos del usuario con Google Firestore
        async function syncUserData(action = 'load') {
            if (!authState.isAuthenticated || !authState.email) return;

            try {
                const emailHash = await sha256(authState.email);
                const docUrl = `https://firestore.googleapis.com/v1/projects/${FIREBASE_PROJECT_ID}/databases/(default)/documents/users/${emailHash}`;

                if (action === 'load') {
                    const response = await fetch(docUrl);
                    if (response.ok) {
                        const data = await response.json();
                        const fields = data.fields || {};

                        let needsSave = false;

                        // 1. Favoritos (Array)
                        let remoteFavs = [];
                        if (fields.favorites && fields.favorites.arrayValue && fields.favorites.arrayValue.values) {
                            remoteFavs = fields.favorites.arrayValue.values.map(v => v.stringValue).filter(Boolean);
                        }
                        const localFavs = JSON.parse(localStorage.getItem('saimap_favorites')) || [];
                        const mergedFavs = Array.from(new Set([...localFavs, ...remoteFavs]));
                        state.favorites = mergedFavs;
                        localStorage.setItem('saimap_favorites', JSON.stringify(mergedFavs));
                        if (localFavs.some(f => !remoteFavs.includes(f))) {
                            needsSave = true;
                        }

                        // 2. Logros (Array)
                        let remoteAch = [];
                        if (fields.achievements && fields.achievements.arrayValue && fields.achievements.arrayValue.values) {
                            remoteAch = fields.achievements.arrayValue.values.map(v => v.stringValue).filter(Boolean);
                        }
                        const localAch = JSON.parse(localStorage.getItem('saimap_achievements')) || [];
                        const mergedAch = Array.from(new Set([...localAch, ...remoteAch]));
                        state.achievements = mergedAch;
                        localStorage.setItem('saimap_achievements', JSON.stringify(mergedAch));
                        if (localAch.some(a => !remoteAch.includes(a))) {
                            needsSave = true;
                        }

                        // 3. Tareas del Planificador (JSON string)
                        let remoteTasks = [];
                        if (fields.plannerTasks && fields.plannerTasks.stringValue) {
                            try {
                                remoteTasks = JSON.parse(fields.plannerTasks.stringValue) || [];
                            } catch (e) {
                                console.error('Error parsing remote planner tasks:', e);
                            }
                        }
                        const localTasks = JSON.parse(localStorage.getItem('saimap_planner_tasks')) || [];
                        const tasksMap = new Map();
                        localTasks.forEach(t => tasksMap.set(t.id, t));
                        remoteTasks.forEach(t => {
                            if (!tasksMap.has(t.id)) {
                                tasksMap.set(t.id, t);
                            } else {
                                const localTask = tasksMap.get(t.id);
                                if (t.completed && !localTask.completed) {
                                    tasksMap.set(t.id, t);
                                }
                            }
                        });
                        const mergedTasks = Array.from(tasksMap.values());
                        state.plannerTasks = mergedTasks;
                        localStorage.setItem('saimap_planner_tasks', JSON.stringify(mergedTasks));
                        
                        if (localTasks.some(t => !remoteTasks.some(rt => rt.id === t.id))) {
                            needsSave = true;
                        } else {
                            const remoteCompletedIds = new Set(remoteTasks.filter(t => t.completed).map(t => t.id));
                            const localCompletedButRemoteNot = localTasks.some(t => t.completed && !remoteCompletedIds.has(t.id));
                            if (localCompletedButRemoteNot) {
                                needsSave = true;
                            }
                        }

                        // 4. Foco semanal (String)
                        let remoteFocus = '';
                        if (fields.weeklyFocus && fields.weeklyFocus.stringValue) {
                            remoteFocus = fields.weeklyFocus.stringValue;
                        }
                        const localFocus = localStorage.getItem('saimap_weekly_focus') || '';
                        const mergedFocus = localFocus || remoteFocus;
                        state.weeklyFocus = mergedFocus;
                        localStorage.setItem('saimap_weekly_focus', mergedFocus);
                        if (localFocus && localFocus !== remoteFocus) {
                            needsSave = true;
                        }

                        render();

                        // Si detectamos cambios locales que no estaban en la nube, sincronizamos de vuelta
                        if (needsSave) {
                            console.log('Local modifications merged, syncing back to Firestore...');
                            await syncUserData('save');
                        }
                    } else if (response.status === 404) {
                        console.log('No user data found in Firestore, creating document...');
                        await syncUserData('save');
                    }
                } else if (action === 'save') {
                    const localFavs = state.favorites || [];
                    const localAch = state.achievements || [];
                    const localTasks = state.plannerTasks || [];
                    const localFocus = state.weeklyFocus || '';

                    const payload = {
                        fields: {
                            favorites: {
                                arrayValue: {
                                    values: localFavs.map(f => ({ stringValue: f }))
                                }
                            },
                            achievements: {
                                arrayValue: {
                                    values: localAch.map(a => ({ stringValue: a }))
                                }
                            },
                            plannerTasks: {
                                stringValue: JSON.stringify(localTasks)
                            },
                            weeklyFocus: {
                                stringValue: localFocus
                            }
                        }
                    };

                    const updateMaskQuery = 'updateMask.fieldPaths=favorites&updateMask.fieldPaths=achievements&updateMask.fieldPaths=plannerTasks&updateMask.fieldPaths=weeklyFocus';
                    const patchUrl = `${docUrl}?${updateMaskQuery}`;

                    const response = await fetch(patchUrl, {
                        method: 'PATCH',
                        headers: {
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify(payload)
                    });

                    if (!response.ok) {
                        const errMsg = await response.text();
                        console.error('Failed to sync user data to Firestore:', errMsg);
                    } else {
                        console.log('User data successfully synchronized to Firestore');
                    }
                }
            } catch (err) {
                console.error('Error during Firestore sync:', err);
            }
        }

        async function loadCustomThemes(subjectId, folder, year, shortId, themesList) {
            const promises = themesList.map(t => {
                const temaFilePart = String(t).replace(/\./g, '-');
                const url = `json/${year}/${folder}/${subjectId}-tema-${temaFilePart}.json`;
                return fetch(url).then(res => {
                    if (!res.ok) throw new Error(`Error al cargar el tema ${t}`);
                    return res.json();
                });
            });

            try {
                const results = await Promise.all(promises);
                
                let mergedQuiz = [];
                let mergedTrainer = [];
                let mergedFlashcards = [];

                results.forEach(data => {
                    if (data.jsonTestA) {
                        // Statistics format
                        mergedQuiz.push(...(data.jsonTestA || []));
                        mergedQuiz.push(...(data.jsonTestB || []));
                    } else {
                        // Standard format
                        mergedQuiz.push(...(data.quiz || []));
                        mergedTrainer.push(...(data.trainer || []));
                        mergedFlashcards.push(...(data.flashcards || []));
                    }
                });

                const combinedData = {
                    quiz: mergedQuiz,
                    trainer: mergedTrainer,
                    flashcards: mergedFlashcards
                };

                const sub = AVAILABLE_SUBJECTS.find(s => s.id === subjectId);
                const cleanThemes = themesList.map(t => String(t).replace(/-/g, '.')).sort((a,b) => {
                    const aParts = a.split('.').map(Number);
                    const bParts = b.split('.').map(Number);
                    for (let i = 0; i < Math.max(aParts.length, bParts.length); i++) {
                        const pa = aParts[i] !== undefined ? aParts[i] : 0;
                        const pb = bParts[i] !== undefined ? bParts[i] : 0;
                        if (pa !== pb) return pa - pb;
                    }
                    return 0;
                });
                subjectName = `${sub ? sub.name : 'Asignatura'} - Temas: ${cleanThemes.join(', ')}`;
                
                initQuestions(combinedData);
            } catch (err) {
                console.error(err);
                alert("Error cargando los temas seleccionados: " + err.message);
            }
        }

        function loadSubject(id, tema = null, updateHistoryState = true) {
            state.selectedSubjectId = id;
            const subject = AVAILABLE_SUBJECTS.find(s => s.id === id);
            const folder = subject ? subject.folder : 'Otros';
            const year = subject ? subject.year : '1º';

            // Si es un tema independiente, redirigir a su archivo de aprendizaje específico
            if (tema) {
                let shortId = id;
                if (id === 'psicologia-del-aprendizaje') shortId = 'aprendizaje';
                else if (id === 'bases-biologicas-del-comportamiento') shortId = 'psicobiologia';
                else if (id === 'historia-de-la-psicologia') shortId = 'historia';
                else if (id === 'psicologia-educativa' || id === 'psicologia-fisiologica') shortId = id;
                else if (id.startsWith('psicologia-de-la-')) shortId = id.replace('psicologia-de-la-', '');
                else if (id.startsWith('psicologia-del-')) shortId = id.replace('psicologia-del-', '');
                else if (id.startsWith('psicologia-')) shortId = id.replace('psicologia-', '');
                
                const temaFilePart = String(tema).replace(/\./g, '-');
                const targetUrl = `temas/${year}/${folder}/${shortId}-tema-${temaFilePart}.html`;
                window.location.href = targetUrl;
                return;
            }

            let title = subject ? subject.name : id.replace(/[-_]/g, ' ').replace(/\b\w/g, c => c.toUpperCase());
            
            state.currentTema = tema;
            if (tema) {
                title += ` - Tema ${tema}`;
            }
            subjectName = title;
            
            if (updateHistoryState) {
                let query = `?asignatura=${id}`;
                if (tema) query += `&tema=${tema}`;
                window.history.pushState(null, '', query);
            }

            // URL del archivo JSON: intenta cargar archivo específico del tema, si no, carga el global
            let fetchUrl = `json/${year}/${folder}/${id}.json`;
            if (tema) {
                const temaFilePart = String(tema).replace(/\./g, '-');
                fetchUrl = `json/${year}/${folder}/${id}-tema-${temaFilePart}.json`;
            }

            fetch(fetchUrl)
                .then(res => {
                    if (!res.ok) {
                        if (tema) {
                            console.log(`No se encontró el JSON del tema, usando general: json/${id}.json`);
                            return fetch(`json/${id}.json`);
                        }
                        throw new Error("No se pudo encontrar el archivo de preguntas en el servidor.");
                    }
                    return res.json();
                })
                .then(data => {
                    initQuestions(data);
                })
                .catch(err => {
                    console.error(err);
                    alert(`Error cargando asignatura: ${err.message}\n\nPor favor, accede desde un enlace válido en Skool.`);
                    appMethods.backToSelector();
                });
        }

        function handleLocalFile(event) {
            const file = event.target.files[0];
            if (!file) return;

            subjectName = file.name.replace(/\.[^/.]+$/, "").replace(/[-_]/g, ' ').replace(/\b\w/g, c => c.toUpperCase());
            state.currentTema = null;

            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const data = JSON.parse(e.target.result);
                    initQuestions(data);
                } catch(err) {
                    alert("Error leyendo el archivo JSON.");
                }
            };
            reader.readAsText(file);
        }

        function initQuestions(data) {
            state.trainerQuestions = [];
            state.flashcardQuestions = [];
            state.hasTrainer = false;
            state.hasFlashcards = false;
            state.studyMode = 'test'; 

            let questions = [];

            if (data && typeof data === 'object' && !Array.isArray(data)) {
                if (Array.isArray(data.quiz)) {
                    questions = data.quiz;
                }
                if (Array.isArray(data.trainer)) {
                    state.trainerQuestions = data.trainer;
                    state.hasTrainer = true;
                }
                if (Array.isArray(data.flashcards)) {
                    state.flashcardQuestions = data.flashcards;
                    state.hasFlashcards = true;
                }
            } else if (Array.isArray(data)) {
                if (data.length > 0) {
                    if (Array.isArray(data[0])) {
                        questions = data.map(q => {
                            let questionText = q[0];
                            let correctIndex = -1;
                            let options = q.slice(1).map((optText, optIdx) => {
                                if (optText.includes('(correcta)')) {
                                    correctIndex = optIdx;
                                    return optText.replace(/\s*\(correcta\)/i, '').trim();
                                }
                                return optText;
                            });
                            if (correctIndex === -1) {
                                correctIndex = 0; 
                            }
                            return {
                                q: questionText,
                                options: options,
                                correct: correctIndex
                            };
                        });
                    } else {
                        questions = data;
                    }
                }
            }

            ALL_QUESTIONS = questions.map((item, idx) => {
                const normQ = item.q || item.question || '';
                const normCorrect = item.correct !== undefined ? item.correct : (item.correctIndex !== undefined ? item.correctIndex : 0);
                return {
                    ...item,
                    id: idx + 1,
                    q: normQ,
                    correct: normCorrect
                };
            });
            state.gameState = 'menu';
            state.questionCount = Math.min(30, ALL_QUESTIONS.length);
            render();
        }

        const shuffleArray = (array) => {
            const newArray = [...array];
            for (let i = newArray.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [newArray[i], newArray[j]] = [newArray[j], newArray[i]];
            }
            return newArray;
        };

        // --- MÉTODOS DEL JUEGO ---
        const appMethods = {
            setQuestionCount: (n) => { state.questionCount = n; render(); },
            startExam: (selectedMode) => {
                state.mode = selectedMode;
                let count = Math.min(state.questionCount, ALL_QUESTIONS.length);
                let selected = shuffleArray(ALL_QUESTIONS).slice(0, count);

                state.activeQuestions = selected.map(q => {
                    let opts = q.options.map((text, idx) => ({ text, isCorrect: idx === q.correct }));
                    let shuffledOpts = shuffleArray(opts);
                    return {
                        ...q,
                        options: shuffledOpts.map(o => o.text),
                        correctIndex: shuffledOpts.findIndex(o => o.isCorrect)
                    };
                });

                state.gameState = 'playing';
                state.currentIndex = 0;
                state.userAnswers = {};
                state.simFeedback = null;
                state.hiddenOptions = [];
                state.timeSpentSeconds = 0;
                
                if(state.playInterval) clearInterval(state.playInterval);
                state.playInterval = setInterval(() => {
                    state.timeSpentSeconds++;
                }, 1000);

                if (state.mode === 'exam') {
                    state.timeLeft = 3600; 
                    if(state.timerInterval) clearInterval(state.timerInterval);
                    state.timerInterval = setInterval(() => {
                        state.timeLeft--;
                        if(state.timeLeft <= 0) {
                            clearInterval(state.timerInterval);
                            appMethods.finishExam();
                        } else {
                            renderTimer();
                        }
                    }, 1000);
                }
                render();
            },
            handleAnswer: (optionIndex) => {
                const currentQ = state.activeQuestions[state.currentIndex];
                if (state.mode === 'sim' && state.simFeedback) return;
                
                if (state.mode === 'sim') {
                    state.simFeedback = { isCorrect: optionIndex === currentQ.correctIndex, selected: optionIndex };
                }
                state.userAnswers[currentQ.id] = optionIndex;
                render();
            },
            nextQuestion: () => {
                if (state.currentIndex < state.activeQuestions.length - 1) {
                    state.currentIndex++;
                    state.simFeedback = null;
                    state.hiddenOptions = [];
                    render();
                } else {
                    appMethods.finishExam();
                }
            },
            prevQuestion: () => {
                if (state.currentIndex > 0) {
                    state.currentIndex--;
                    state.simFeedback = null; 
                    state.hiddenOptions = [];
                    render();
                }
            },
            finishExam: () => {
                if(state.timerInterval) clearInterval(state.timerInterval);
                if(state.playInterval) clearInterval(state.playInterval);
                state.gameState = 'finished';

                const { correct, incorrect, blank, score } = calculateScore();
                const total = state.activeQuestions.length;
                saveAttempt({
                    subject: subjectName,
                    date: new Date().toISOString(),
                    mode: state.mode,
                    correct,
                    incorrect,
                    blank,
                    score: Number(score.toFixed(1)),
                    total: total,
                    timeSpent: formatTime(state.timeSpentSeconds)
                });

                // Desbloqueo de logros
                appMethods.unlockAchievement('first_steps');
                const historyCount = getHistory().length;
                if (historyCount >= 5) {
                    appMethods.unlockAchievement('steady_student');
                }

                // Medallas por examen perfecto (específicas por asignatura)
                if (correct === total) {
                    const subId = state.selectedSubjectId || 'otros';
                    if (total === 30) {
                        appMethods.unlockAchievement(`medal_bronze_${subId}`);
                    } else if (total === 75) {
                        appMethods.unlockAchievement(`medal_silver_${subId}`);
                    } else if (total === 150) {
                        appMethods.unlockAchievement(`medal_gold_${subId}`);
                    } else if (total === 300) {
                        appMethods.unlockAchievement(`medal_platinum_${subId}`);
                    }
                }

                render();
            },
            useHint: () => {
                if (state.hiddenOptions.length > 0) return;
                const currentQ = state.activeQuestions[state.currentIndex];
                const wrongs = currentQ.options.map((_, i) => i).filter(i => i !== currentQ.correctIndex);
                state.hiddenOptions = [wrongs[Math.floor(Math.random() * wrongs.length)]];
                
                if (currentQ.hint) {
                    alert("PISTA: " + currentQ.hint);
                }
                render();
            },
            restart: () => {
                if (state.timerInterval) clearInterval(state.timerInterval);
                if (state.playInterval) clearInterval(state.playInterval);
                state.gameState = 'menu';
                render();
            },
            backToSelector: () => {
                if (state.timerInterval) clearInterval(state.timerInterval);
                if (state.playInterval) clearInterval(state.playInterval);
                state.gameState = 'select';
                ALL_QUESTIONS = [];
                state.currentTema = null;
                window.history.pushState(null, '', window.location.pathname);
                render();
            },
            enterSubjectFolder: (id) => {
                state.selectedSubjectId = id;
                state.selectionMode = false;
                state.selectedThemes = [];
                state.gameState = 'subject_folder';
                render();
            },
            toggleSelectionMode: (enabled) => {
                state.selectionMode = enabled;
                state.selectedThemes = [];
                render();
            },
            toggleThemeSelection: (temaKey) => {
                if (state.selectedThemes.includes(temaKey)) {
                    state.selectedThemes = state.selectedThemes.filter(t => t !== temaKey);
                } else {
                    state.selectedThemes.push(temaKey);
                }
                render();
            },
            startCustomTest: () => {
                if (state.selectedThemes.length === 0) return;
                
                const subjectId = state.selectedSubjectId;
                const subject = AVAILABLE_SUBJECTS.find(s => s.id === subjectId);
                const folder = subject ? subject.folder : 'Otros';
                const year = subject ? subject.year : '1º';

                let shortId = subjectId;
                if (subjectId === 'psicologia-del-aprendizaje') shortId = 'aprendizaje';
                else if (subjectId === 'bases-biologicas-del-comportamiento') shortId = 'psicobiologia';
                else if (subjectId === 'historia-de-la-psicologia') shortId = 'historia';
                else if (subjectId === 'psicologia-educativa' || subjectId === 'psicologia-fisiologica') shortId = subjectId;
                else if (subjectId.startsWith('psicologia-de-la-')) shortId = subjectId.replace('psicologia-de-la-', '');
                else if (subjectId.startsWith('psicologia-del-')) shortId = subjectId.replace('psicologia-del-', '');
                else if (subjectId.startsWith('psicologia-')) shortId = subjectId.replace('psicologia-', '');

                loadCustomThemes(subjectId, folder, year, shortId, state.selectedThemes);
            },
            setFilterYear: (year) => {
                state.filterYear = year;
                render();
            },
            toggleFavorite: (id, event) => {
                if (event) {
                    event.stopPropagation();
                }
                let favs = JSON.parse(localStorage.getItem('saimap_favorites')) || [];
                if (favs.includes(id)) {
                    favs = favs.filter(x => x !== id);
                } else {
                    favs.push(id);
                }
                localStorage.setItem('saimap_favorites', JSON.stringify(favs));
                state.favorites = favs;
                if (authState.isAuthenticated) {
                    syncUserData('save');
                }
                render();
            },
            toggleUploader: () => {
                state.showUploader = !state.showUploader;
                render();
            },
            setStudyMode: (mode) => {
                state.studyMode = mode;
                if (mode === 'trainer') {
                    state.questionCount = Math.min(15, state.trainerQuestions.length);
                } else if (mode === 'test') {
                    state.questionCount = Math.min(30, ALL_QUESTIONS.length);
                }
                render();
            },
            startTrainer: () => {
                let count = Math.min(state.questionCount, state.trainerQuestions.length);
                state.activeQuestions = shuffleArray(state.trainerQuestions).slice(0, count).map((q, idx) => ({ id: idx + 1, ...q }));
                state.gameState = 'playing';
                state.currentIndex = 0;
                state.trainerAnswers = {};
                state.trainerChecked = {};
                state.timeSpentSeconds = 0;
                if (state.playInterval) clearInterval(state.playInterval);
                state.playInterval = setInterval(() => {
                    state.timeSpentSeconds++;
                }, 1000);
                render();
            },
            handleTrainerInput: (val) => {
                state.trainerAnswers[state.currentIndex] = val;
            },
            checkTrainerAnswer: () => {
                state.trainerChecked[state.currentIndex] = true;
                render();
            },
            nextTrainerQuestion: () => {
                if (state.currentIndex < state.activeQuestions.length - 1) {
                    state.currentIndex++;
                    render();
                } else {
                    appMethods.finishTrainer();
                }
            },
            finishTrainer: () => {
                if (state.playInterval) clearInterval(state.playInterval);
                state.gameState = 'finished';
                appMethods.unlockAchievement('memory_master');
                render();
            },
            startFlashcards: () => {
                state.activeQuestions = shuffleArray(state.flashcardQuestions);
                state.gameState = 'playing';
                state.flashcardsProgress = {
                    known: [],
                    review: [],
                    current: 0
                };
                render();
            },
            flipCard: () => {
                const card = document.getElementById('active-flashcard');
                if (card) card.classList.toggle('flipped');
            },
            markCardKnown: (idx) => {
                const q = state.activeQuestions[idx];
                if (!state.flashcardsProgress.known.includes(q.q)) state.flashcardsProgress.known.push(q.q);
                state.flashcardsProgress.review = state.flashcardsProgress.review.filter(x => x !== q.q);
                appMethods.nextFlashcard();
            },
            markCardReview: (idx) => {
                const q = state.activeQuestions[idx];
                if (!state.flashcardsProgress.review.includes(q.q)) state.flashcardsProgress.review.push(q.q);
                state.flashcardsProgress.known = state.flashcardsProgress.known.filter(x => x !== q.q);
                appMethods.nextFlashcard();
            },
            nextFlashcard: () => {
                if (state.flashcardsProgress.current < state.activeQuestions.length - 1) {
                    state.flashcardsProgress.current++;
                    render();
                } else {
                    alert('¡Has completado todas las fichas de esta sesión!');
                    appMethods.backToSelector();
                }
            },
            prevFlashcard: () => {
                if (state.flashcardsProgress.current > 0) {
                    state.flashcardsProgress.current--;
                    render();
                }
            },
            // Planner methods
            changePlannerDate: (offset) => {
                const d = new Date(state.plannerDate);
                if (state.plannerView === 'weekly') {
                    d.setDate(d.getDate() + offset * 7);
                } else {
                    d.setMonth(d.getMonth() + offset);
                }
                state.plannerDate = d;
                render();
            },
            setPlannerView: (view) => {
                state.plannerView = view;
                render();
            },
            addPlannerTask: (text, dateStr, scope, subjectId) => {
                if (!authState.isAuthenticated) {
                    state.showLoginModal = true;
                    render();
                    return;
                }
                if (!text.trim()) {
                    alert('Por favor, escribe el nombre de la tarea.');
                    return;
                }
                if (!dateStr) {
                    alert('Por favor, selecciona una fecha.');
                    return;
                }

                // Check pending task limit (max 5 pending tasks per day)
                const pendingForDay = state.plannerTasks.filter(t => t.date === dateStr && !t.completed);
                if (pendingForDay.length >= 5) {
                    alert('¡Límite alcanzado! No puedes tener más de 5 tareas pendientes para un mismo día. Intenta completar o aplazar alguna.');
                    return;
                }

                const newTask = {
                    id: Date.now().toString(),
                    text: text.trim(),
                    date: dateStr,
                    scope: scope || 'diario',
                    subjectId: subjectId || null,
                    completed: false,
                    createdAt: new Date().toISOString()
                };

                state.plannerTasks.push(newTask);
                localStorage.setItem('saimap_planner_tasks', JSON.stringify(state.plannerTasks));
                if (authState.isAuthenticated) {
                    syncUserData('save');
                }
                render();
            },
            togglePlannerTask: (taskId) => {
                if (!authState.isAuthenticated) {
                    state.showLoginModal = true;
                    render();
                    return;
                }
                const task = state.plannerTasks.find(t => t.id === taskId);
                if (task) {
                    task.completed = !task.completed;
                    localStorage.setItem('saimap_planner_tasks', JSON.stringify(state.plannerTasks));
                    if (authState.isAuthenticated) {
                        syncUserData('save');
                    }
                    render();
                }
            },
            deletePlannerTask: (taskId) => {
                if (!authState.isAuthenticated) {
                    state.showLoginModal = true;
                    render();
                    return;
                }
                if (confirm('¿Estás seguro de que quieres eliminar esta tarea?')) {
                    state.plannerTasks = state.plannerTasks.filter(t => t.id !== taskId);
                    localStorage.setItem('saimap_planner_tasks', JSON.stringify(state.plannerTasks));
                    if (authState.isAuthenticated) {
                        syncUserData('save');
                    }
                    render();
                }
            },
            setWeeklyFocus: (focusText) => {
                if (!authState.isAuthenticated) return;
                state.weeklyFocus = focusText.trim();
                localStorage.setItem('saimap_weekly_focus', state.weeklyFocus);
                syncUserData('save');
            },
            goToday: () => {
                state.plannerDate = new Date();
                render();
            },
            setSelectedPlannerDay: (dayStr) => {
                state.selectedPlannerDay = dayStr;
                render();
            },
            unlockAchievement: (id) => {
                if (state.achievements.includes(id)) return;
                state.achievements.push(id);
                localStorage.setItem('saimap_achievements', JSON.stringify(state.achievements));
                
                showAchievementNotification(id);
                
                if (authState.isAuthenticated) {
                    syncUserData('save');
                }
                render();
            }
        };

        function resolveAchievementDetails(id) {
            if (id.startsWith('medal_')) {
                let medalType = '';
                let questionsCount = 0;
                let baseId = '';
                
                if (id.startsWith('medal_bronze_')) {
                    medalType = 'bronze';
                    questionsCount = 30;
                    baseId = 'medal_bronze';
                } else if (id.startsWith('medal_silver_')) {
                    medalType = 'silver';
                    questionsCount = 75;
                    baseId = 'medal_silver';
                } else if (id.startsWith('medal_gold_')) {
                    medalType = 'gold';
                    questionsCount = 150;
                    baseId = 'medal_gold';
                } else if (id.startsWith('medal_platinum_')) {
                    medalType = 'platinum';
                    questionsCount = 300;
                    baseId = 'medal_platinum';
                }

                if (baseId) {
                    const subjectId = id.substring(baseId.length + 1);
                    const subject = AVAILABLE_SUBJECTS.find(s => s.id === subjectId);
                    const subjectName = subject ? subject.name : 'Asignatura';
                    
                    let medalName = '';
                    if (medalType === 'bronze') medalName = 'Medalla de Bronce';
                    else if (medalType === 'silver') medalName = 'Medalla de Plata';
                    else if (medalType === 'gold') medalName = 'Medalla de Oro';
                    else if (medalType === 'platinum') medalName = 'Medalla de Platino';

                    return {
                        id: id,
                        name: `${medalName} - ${subjectName}`,
                        description: `Nota de 10.0 (100% de aciertos) en el examen de ${questionsCount} preguntas de esta asignatura.`,
                        icon: 'award',
                        medalType: medalType
                    };
                }
            }

            return ACHIEVEMENTS_CONFIG.find(a => a.id === id) || null;
        }

            let medalColorClass = '';
            if (config.medalType === 'bronze') medalColorClass = 'bg-amber-100 text-amber-600 border border-amber-200/50 shadow-inner shadow-amber-500/5';
            else if (config.medalType === 'silver') medalColorClass = 'bg-slate-100 text-slate-500 border border-slate-200/50 shadow-inner shadow-slate-400/5';
            else if (config.medalType === 'gold') medalColorClass = 'bg-yellow-100 text-yellow-600 border border-yellow-200/50 shadow-inner shadow-yellow-500/5';

            toast.innerHTML = `

        const calculateScore = () => {
            let correct = 0, incorrect = 0, blank = 0;
            state.activeQuestions.forEach(q => {
                const ans = state.userAnswers[q.id];
                if (ans === undefined) blank++;
                else if (ans === q.correctIndex) correct++;
                else incorrect++;
            });
            const score = (correct * 1) - (incorrect * 0.5);
            return { correct, incorrect, blank, score: Math.max(0, score) };
        };

        // --- HELPERS PARA EL PLANIFICADOR ---
        function getMonday(d) {
            const date = new Date(d);
            const day = date.getDay();
            const diff = date.getDate() - day + (day === 0 ? -6 : 1);
            const monday = new Date(date.setDate(diff));
            monday.setHours(0,0,0,0);
            return monday;
        }

        function formatDateStr(date) {
            const y = date.getFullYear();
            const m = String(date.getMonth() + 1).padStart(2, '0');
            const d = String(date.getDate()).padStart(2, '0');
            return `${y}-${m}-${d}`;
        }

        function isDateInWeek(dateStr, monday) {
            const d = new Date(dateStr + 'T00:00:00');
            const m = new Date(monday);
            const sunday = new Date(m);
            sunday.setDate(sunday.getDate() + 6);
            sunday.setHours(23,59,59,999);
            return d >= m && d <= sunday;
        }

                                let iconClass = "bg-white border-slate-200 text-slate-400";

                                if (isSim && state.simFeedback) {

                                        statusClass = "correct-bg border-green-500 ring-1 ring-green-500";
                                        iconClass = "bg-green-500 text-white border-green-500";
                                        iconContent = `<i data-lucide="check" class="w-4 h-4"></i>`;
                                    } else if (state.simFeedback.selected === idx) {
                                        statusClass = "wrong-bg border-red-500";
                                        iconClass = "bg-red-500 text-white border-red-500";
                                        iconContent = `<i data-lucide="x" class="w-4 h-4"></i>`;
                                    } else {
                                        statusClass = "opacity-40 border-transparent bg-transparent";
                                    }

        function cleanText(str) {
            if (!str) return '';
            return str
                .toLowerCase()
                .normalize("NFD")
                .replace(/[\u0300-\u036f]/g, "")
                .replace(/[.,\/#!$%\^&\*;:{}=\-_`~()¡?¿]/g,"")
                .replace(/\s+/g, ' ')
                .trim();
        }

        function checkKeywordPresent(userAns, keyword) {
            if (!userAns) return false;
            const userClean = cleanText(userAns);
            const keywordClean = cleanText(keyword);
            return userClean.includes(keywordClean);
        }

                                <div>
                                    <h4 class="font-bold text-slate-800 text-sm">Base de Datos Masiva</h4>
                                    <p class="text-xs text-slate-500 mt-0.5">Media de 1.000 preguntas tipo test y 600-700 flashcards por asignatura.</p>
                                </div>
                            </div>
                            
                            <div class="flex items-start gap-4 p-4 rounded-2xl bg-indigo-50/50 border border-indigo-100/50">
                                <div class="p-2 bg-indigo-100 text-indigo-600 rounded-xl">
                                    <i data-lucide="layers" class="w-5 h-5"></i>
                                </div>
                                <div>
                                    <h4 class="font-bold text-slate-800 text-sm">5 Recursos Clave por Tema</h4>
                                    <p class="text-xs text-slate-500 mt-0.5">Vídeo explicativo, resumen, PowerPoint, podcast y mapa mental/esquema.</p>
                                </div>
                            </div>
                            
                            <div class="flex items-start gap-4 p-4 rounded-2xl bg-indigo-50/50 border border-indigo-100/50">
                                <div class="p-2 bg-indigo-100 text-indigo-600 rounded-xl">
                                    <i data-lucide="award" class="w-5 h-5"></i>
                                </div>
                                <div>
                                    <h4 class="font-bold text-slate-800 text-sm">Contenido Extra Premium</h4>
                                    <p class="text-xs text-slate-500 mt-0.5">Inglés hasta nivel B1, cursos de especialización y preparación PIR completa.</p>
                                </div>
                            </div>
                        </div>
                        
                        <!-- Actions -->
                        <div class="space-y-4">
                            <a href="https://www.skool.com/saimap-ia-learning-4493/about" target="_blank"
                                class="w-full py-4 px-6 bg-gradient-to-r from-indigo-600 to-violet-600 hover:from-indigo-700 hover:to-violet-700 text-white font-bold rounded-2xl shadow-lg shadow-indigo-200 hover:shadow-indigo-300 transition-all text-center flex items-center justify-center gap-2.5 text-sm">
                                <span>Unirse a la Academia en Skool</span>
                                <i data-lucide="external-link" class="w-4 h-4"></i>
                            </a>
                            
                            <div class="text-center pt-2">
                                <button onclick="state.showPromoModal = false; state.showLoginModal = true; render();"
                                    class="text-indigo-600 hover:text-indigo-800 font-extrabold text-sm transition-colors hover:underline">
                                    Ya soy alumno (Iniciar Sesión)
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            `;
        }

        function renderLoginModalHTML() {
            const errorBanner = authState.error ? `
                <div class="mb-5 p-4 bg-rose-50 border border-rose-200 text-rose-800 rounded-2xl flex items-start gap-3 text-sm">
                    <i data-lucide="alert-circle" class="w-5 h-5 shrink-0 mt-0.5 text-rose-600"></i>
                    <div>
                        <span class="font-semibold">Acceso denegado</span>
                        <p class="mt-0.5 text-rose-700/90 leading-relaxed">${authState.error}</p>
                    </div>
                </div>
            ` : '';

            const loadingSpinner = authState.loading ? `
                <div class="absolute inset-0 bg-white/70 backdrop-blur-sm flex flex-col justify-center items-center rounded-3xl z-10">
                    <div class="w-12 h-12 border-4 border-indigo-600/30 border-t-indigo-600 rounded-full animate-spin"></div>
                    <p class="mt-4 text-sm font-semibold text-slate-700">Verificando credenciales...</p>
                </div>
            ` : '';

            return `
                <div onclick="if(event.target === this) { state.showLoginModal = false; render(); }" class="fixed inset-0 z-50 bg-slate-950/60 backdrop-blur-md flex items-center justify-center p-4">
                    <div class="w-full max-w-md bg-white/90 backdrop-blur-xl border border-white/20 shadow-[0_20px_50px_rgba(0,0,0,0.15)] rounded-[32px] p-8 md:p-10 relative scale-in">
                        ${loadingSpinner}
                        
                        <!-- Close Button -->
                        <button onclick="state.showLoginModal = false; render();" class="absolute top-4 right-4 text-slate-400 hover:text-slate-600 transition-colors">
                            <i data-lucide="x" class="w-6 h-6"></i>
                        </button>
                        
                        <!-- Logo / Header -->
                        <div class="text-center mb-8">
                            <div class="inline-flex items-center justify-center w-16 h-16 rounded-2xl bg-gradient-to-tr from-indigo-600 to-violet-600 text-white shadow-xl shadow-indigo-100 mb-5">
                                <i data-lucide="shield-check" class="w-8 h-8"></i>
                            </div>
                            <h1 class="text-2xl font-extrabold text-slate-900 tracking-tight">Acceso Alumnos</h1>
                            <p class="mt-2.5 text-sm text-slate-500 leading-relaxed">
                                Introduce el correo registrado en nuestra academia de Skool para desbloquear el acceso completo.
                            </p>
                        </div>

                        ${errorBanner}

                        <!-- Formulario -->
                        <form onsubmit="handleLoginSubmit(event)" class="space-y-5">
                            <div>
                                <label for="login-email" class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-2">Correo Electrónico</label>
                                <div class="relative">
                                    <span class="absolute inset-y-0 left-0 pl-4 flex items-center text-slate-400">
                                        <i data-lucide="mail" class="w-5 h-5"></i>
                                    </span>
                                    <input type="email" id="login-email" required placeholder="tu-correo@ejemplo.com"
                                        value="${authState.email}"
                                        class="w-full pl-11 pr-4 py-3.5 bg-slate-50 border border-slate-200 focus:bg-white focus:outline-none focus:ring-2 focus:ring-indigo-600/20 focus:border-indigo-600 rounded-2xl text-slate-900 placeholder-slate-400 font-medium transition-all text-sm">
                                </div>
                            </div>

                            <button type="submit"
                                class="w-full py-4 px-6 bg-indigo-600 hover:bg-indigo-700 text-white font-bold rounded-2xl shadow-lg shadow-indigo-200 hover:shadow-indigo-300 active:scale-[0.98] transition-all flex items-center justify-center gap-2.5 text-sm">
                                <span>Verificar y Entrar</span>
                                <i data-lucide="arrow-right" class="w-4 h-4"></i>
                            </button>
                        </form>

                        <!-- Footer Privacidad -->
                        <div class="mt-8 pt-6 border-t border-slate-100 text-center">
                            <div class="flex items-center justify-center gap-2 text-slate-400 text-xs">
                                <i data-lucide="lock" class="w-3.5 h-3.5"></i>
                                <span>Privacidad Garantizada</span>
                            </div>
                            <p class="mt-2 text-[10px] text-slate-400 leading-relaxed max-w-[280px] mx-auto">
                                Tu correo se cifra localmente (SHA-256) antes de enviarse. Nunca almacenamos tu correo en texto plano en nuestros servidores.
                            </p>
                        </div>
                    </div>
                </div>
            `;
        }

        function render() {
            const app = document.getElementById('app');
            
            if (state.gameState === 'select') {
                app.innerHTML = renderSelector();
            } else if (state.gameState === 'subject_folder') {
                app.innerHTML = renderSubjectFolder();
            } else if (state.gameState === 'menu') {
                app.innerHTML = renderMenu();
            } else if (state.gameState === 'playing') {
                if (state.studyMode === 'trainer') {
                    app.innerHTML = renderTrainerPlaying();
                } else if (state.studyMode === 'flashcards') {
                    app.innerHTML = renderFlashcardsPlaying();
                } else {
                    app.innerHTML = renderPlaying();
                }
            } else if (state.gameState === 'finished') {
                if (state.studyMode === 'trainer') {
                    app.innerHTML = renderTrainerFinished();
                } else {
                    app.innerHTML = renderFinished();
                }
            } else if (state.gameState === 'planner') {
                app.innerHTML = renderPlanner();
            } else if (state.gameState === 'achievements') {
                app.innerHTML = renderAchievements();
            }

            if (state.showPromoModal) {
                app.insertAdjacentHTML('beforeend', renderPromoModalHTML());
            }
            if (state.showLoginModal) {
                app.insertAdjacentHTML('beforeend', renderLoginModalHTML());
            }

            lucide.createIcons();
            if (window.MathJax && window.MathJax.typesetPromise) {
                MathJax.typesetClear([app]);
                MathJax.typesetPromise([app]).catch(err => console.log('MathJax typeset error:', err));
            }
            window.scrollTo(0, 0);
        }

        checkAuthOnLoad();
    </script>
</body>
</html>
