        function initThreeJSBrain() {
            const container = document.getElementById('brain-3d-container');
            if (!container) return;
            container.innerHTML = '';

            const width = container.clientWidth;
            const height = container.clientHeight;

            const scene = new THREE.Scene();
            scene.background = new THREE.Color(0x08111e);
            scene.fog = new THREE.FogExp2(0x08111e, 0.055);

            const camera = new THREE.PerspectiveCamera(40, width / height, 0.1, 100);
            camera.position.set(0, 0.4, 5.8);
            camera.lookAt(0, 0, 0);
            window.brainCamera = camera;

            const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(width, height);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            renderer.toneMapping = THREE.ACESFilmicToneMapping;
            renderer.toneMappingExposure = 1.1;
            container.appendChild(renderer.domElement);

            const brainGroup = new THREE.Group();
            scene.add(brainGroup);

            // ─── MULTI-OCTAVE BRAIN DEFORMATION ──────────────────────────
            // Deforms a high-res sphere into a realistic brain cortex using
            // 4 octaves of sine waves to create gyri (ridges) and sulci (grooves)
            const applyBrainDeform = (geometry, opts) => {
                const { scaleX=1, scaleY=1, scaleZ=1,
                        shiftY=0, shiftZ=0,
                        octaves=[{f:8,a:0.09},{f:16,a:0.055},{f:28,a:0.03},{f:46,a:0.016}],
                        flattenBottom=false } = (opts || {});
                const pos = geometry.attributes.position;
                for (let i = 0; i < pos.count; i++) {
                    let x = pos.getX(i);
                    let y = pos.getY(i);
                    let z = pos.getZ(i);
                    // Flatten inferior surface (how brain sits on skull base)
                    let sy = scaleY * (flattenBottom && y < 0 ? Math.max(0.65, 1 + 0.28 * y) : 1);
                    // Multi-octave displacement
                    let wrinkle = 0;
                    for (const oct of octaves) {
                        wrinkle += oct.a * Math.sin(x * oct.f + 0.5)
                                       * Math.cos(y * oct.f * 1.1 + 1.2)
                                       * Math.sin(z * oct.f * 0.9 + 0.8);
                    }
                    pos.setXYZ(i,
                        x * scaleX * (1 + wrinkle),
                        y * sy * (1 + wrinkle * 0.75) + shiftY,
                        z * scaleZ * (1 + wrinkle * 0.85) + shiftZ
                    );
                }
                geometry.computeVertexNormals();
                return geometry;
            };

            // ─── MAIN CEREBRAL CORTEX ─────────────────────────────────────
            // Single high-resolution mesh: pinkish-grey real brain color
            const cortexGeo = applyBrainDeform(
                new THREE.SphereGeometry(1.38, 96, 96),
                {
                    scaleX: 1.0, scaleY: 0.88, scaleZ: 1.12,
                    flattenBottom: true,
                    octaves: [{f:7,a:0.10},{f:14,a:0.062},{f:26,a:0.034},{f:44,a:0.018}]
                }
            );
            const cortexMat = new THREE.MeshStandardMaterial({
                color: 0xd1a098,
                roughness: 0.88,
                metalness: 0.0,
            });
            const cortexMesh = new THREE.Mesh(cortexGeo, cortexMat);
            brainGroup.add(cortexMesh);

            // ─── LOBE OVERLAYS ────────────────────────────────────────────
            // Transparent colored zones showing each anatomical lobe region
            const lobeConfigs = {
                frontal:   { color: 0x3b82f6, scaleX:1.02, scaleY:0.75, scaleZ:0.72, dy: 0.16, dz: 0.65,
                             oct:[{f:6,a:0.07},{f:13,a:0.04}] },
                parietal:  { color: 0x8b5cf6, scaleX:1.0,  scaleY:0.58, scaleZ:0.80, dy: 0.52, dz:-0.22,
                             oct:[{f:7,a:0.08},{f:15,a:0.04}] },
                temporal:  { color: 0xeab308, scaleX:1.04, scaleY:0.46, scaleZ:0.88, dy:-0.44, dz: 0.10,
                             oct:[{f:6,a:0.07},{f:12,a:0.04}] },
                occipital: { color: 0x10b981, scaleX:0.72, scaleY:0.60, scaleZ:0.58, dy: 0.02, dz:-1.02,
                             oct:[{f:8,a:0.08},{f:16,a:0.04}] },
            };

            const regionMeshes = {};

            Object.entries(lobeConfigs).forEach(function(entry) {
                const id = entry[0];
                const cfg = entry[1];
                const isSelected = state.selectedRegion === id;
                const geo = applyBrainDeform(
                    new THREE.SphereGeometry(1.44, 48, 48),
                    { scaleX: cfg.scaleX, scaleY: cfg.scaleY, scaleZ: cfg.scaleZ,
                      shiftY: cfg.dy, shiftZ: cfg.dz, octaves: cfg.oct, flattenBottom: true }
                );
                const mat = new THREE.MeshStandardMaterial({
                    color: cfg.color,
                    transparent: true,
                    opacity: isSelected ? 0.62 : 0.20,
                    roughness: 0.9,
                    metalness: 0,
                    depthWrite: false,
                    emissive: isSelected ? new THREE.Color(cfg.color) : new THREE.Color(0x000000),
                    emissiveIntensity: isSelected ? 0.45 : 0.0,
                });
                const mesh = new THREE.Mesh(geo, mat);
                mesh.userData = { regionId: id };
                brainGroup.add(mesh);
                regionMeshes[id] = mesh;
            });

            // ─── CEREBELLUM ───────────────────────────────────────────────
            // Distinctive horizontal folia (fine striations) = real cerebellum look
            const cerebGeo = new THREE.SphereGeometry(0.52, 52, 36);
            (function() {
                const p = cerebGeo.attributes.position;
                for (let i = 0; i < p.count; i++) {
                    let x = p.getX(i);
                    let y = p.getY(i);
                    let z = p.getZ(i);
                    const folia  = 0.055 * Math.sin(y * 42);
                    const lobule = 0.04  * Math.sin(y * 14) * Math.cos(x * 8);
                    const flatTop = y > 0 ? -0.14 * y : 0.04 * (-y);
                    p.setXYZ(i,
                        x * 1.25 * (1 + folia * 0.3 + lobule * 0.2),
                        y * 0.62 + flatTop + folia,
                        z * 0.85 * (1 + folia * 0.3)
                    );
                }
                cerebGeo.computeVertexNormals();
            })();
            const isSelCereb = state.selectedRegion === 'cerebelo';
            const cerebMat = new THREE.MeshStandardMaterial({
                color: isSelCereb ? 0xff8585 : 0xbe9090,
                roughness: 0.85, metalness: 0,
                emissive: isSelCereb ? new THREE.Color(0xef4444) : new THREE.Color(0x000000),
                emissiveIntensity: isSelCereb ? 0.5 : 0.0,
                transparent: !isSelCereb, opacity: isSelCereb ? 1.0 : 0.93,
            });
            const cerebMesh = new THREE.Mesh(cerebGeo, cerebMat);
            cerebMesh.position.set(0, -1.08, -0.72);
            cerebMesh.userData = { regionId: 'cerebelo' };
            brainGroup.add(cerebMesh);
            regionMeshes['cerebelo'] = cerebMesh;

            // ─── BRAINSTEM ────────────────────────────────────────────────
            // Tapered cylinder with slight anterior lean
            const stemGeo = new THREE.CylinderGeometry(0.155, 0.10, 1.05, 18, 4, false);
            (function() {
                const p = stemGeo.attributes.position;
                for (let i = 0; i < p.count; i++) {
                    let x = p.getX(i);
                    let y = p.getY(i);
                    let z = p.getZ(i);
                    z += 0.12 * (y / 0.525);
                    x += 0.02 * Math.sin(y * 18);
                    p.setXYZ(i, x, y, z);
                }
                stemGeo.computeVertexNormals();
            })();
            const isSelTronco = state.selectedRegion === 'tronco';
            const stemMat = new THREE.MeshStandardMaterial({
                color: isSelTronco ? 0xffa94d : 0xb8876a,
                roughness: 0.78, metalness: 0,
                emissive: isSelTronco ? new THREE.Color(0xf97316) : new THREE.Color(0x000000),
                emissiveIntensity: isSelTronco ? 0.5 : 0.0,
            });
            const stemMesh = new THREE.Mesh(stemGeo, stemMat);
            stemMesh.position.set(0, -1.60, 0.22);
            stemMesh.userData = { regionId: 'tronco' };
            brainGroup.add(stemMesh);
            regionMeshes['tronco'] = stemMesh;

            window.brainMeshes = regionMeshes;

            // ─── THREE-POINT LIGHTING ─────────────────────────────────────
            scene.add(new THREE.AmbientLight(0xfff8f0, 0.55));
            const keyLight = new THREE.DirectionalLight(0xfff0dd, 1.35);
            keyLight.position.set(2.5, 5.0, 4.5);
            scene.add(keyLight);
            const fillLight = new THREE.DirectionalLight(0xb8d4ff, 0.45);
            fillLight.position.set(-4.5, 1.5, -3.0);
            scene.add(fillLight);
            const rimLight = new THREE.DirectionalLight(0xff9980, 0.25);
            rimLight.position.set(0.5, -4.0, -5.0);
            scene.add(rimLight);

            // ─── INTERACTION ──────────────────────────────────────────────
            let isDragging = false;
            let previousMousePosition = { x: 0, y: 0 };

            const handleStart = (clientX, clientY) => {
                isDragging = true;
                previousMousePosition = { x: clientX, y: clientY };
            };

            const handleMove = (clientX, clientY) => {
                if (!isDragging) return;
                const deltaMove = {
                    x: clientX - previousMousePosition.x,
                    y: clientY - previousMousePosition.y
                };
                brainGroup.rotation.y += deltaMove.x * 0.007;
                brainGroup.rotation.x += deltaMove.y * 0.007;
                previousMousePosition = { x: clientX, y: clientY };
            };

            container.addEventListener('mousedown', (e) => handleStart(e.clientX, e.clientY));
            container.addEventListener('mousemove', (e) => handleMove(e.clientX, e.clientY));
            window.addEventListener('mouseup', () => isDragging = false);

            container.addEventListener('touchstart', (e) => {
                if (e.touches.length === 1) handleStart(e.touches[0].clientX, e.touches[0].clientY);
            });
            container.addEventListener('touchmove', (e) => {
                if (e.touches.length === 1) handleMove(e.touches[0].clientX, e.touches[0].clientY);
            });
            window.addEventListener('touchend', () => isDragging = false);

            container.addEventListener('wheel', (e) => {
                e.preventDefault();
                const scale = brainGroup.scale.x - e.deltaY * 0.0003;
                const clampedScale = Math.max(0.5, Math.min(2.0, scale));
                brainGroup.scale.set(clampedScale, clampedScale, clampedScale);
            }, { passive: false });

            const raycaster = new THREE.Raycaster();
            const mouse = new THREE.Vector2();

            container.addEventListener('click', (e) => {
                const rect = container.getBoundingClientRect();
                mouse.x = ((e.clientX - rect.left) / rect.width) * 2 - 1;
                mouse.y = -((e.clientY - rect.top) / rect.height) * 2 + 1;
                raycaster.setFromCamera(mouse, camera);
                const allMeshes = Object.values(regionMeshes).concat([cortexMesh]);
                const intersects = raycaster.intersectObjects(allMeshes);
                if (intersects.length > 0) {
                    const regionId = intersects[0].object.userData.regionId;
                    if (regionId) selectBrainRegion(regionId);
                }
            });

            if (state.brain3dAnimId) {
                cancelAnimationFrame(state.brain3dAnimId);
                state.brain3dAnimId = null;
            }

            function animate() {
                if (state.gameState !== 'brain3d' || state.selectedBrainModel !== 'procedural') return;
                state.brain3dAnimId = requestAnimationFrame(animate);
                if (!isDragging) {
                    brainGroup.rotation.y += 0.003;
                }
                renderer.render(scene, camera);
            }

            animate();

            const resizeObserver = new ResizeObserver(() => {
                if (!container || container.clientWidth === 0) return;
                const w = container.clientWidth;
                const h = container.clientHeight;
                camera.aspect = w / h;
                camera.updateProjectionMatrix();
                renderer.setSize(w, h);
            });
            resizeObserver.observe(container);
        }

        let synapseParticles = [];
        let pspVoltage = 40;

        function initSynapseSimulator() {
            const canvas = document.getElementById('synapse-canvas');
            if (!canvas) return;

            const ctx = canvas.getContext('2d');
            let animId;

            const resizeCanvas = () => {
                if (!canvas.parentElement) return;
                canvas.width = canvas.parentElement.clientWidth;
                canvas.height = canvas.parentElement.clientHeight;
            };
            resizeCanvas();

            const receptors = [
                { x: 0.2, active: false, activeTimer: 0 },
                { x: 0.35, active: false, activeTimer: 0 },
                { x: 0.5, active: false, activeTimer: 0 },
                { x: 0.65, active: false, activeTimer: 0 },
                { x: 0.8, active: false, activeTimer: 0 }
            ];

            function draw() {
                if (state.gameState !== 'brain3d' || state.brainSubTab !== 'synapse') {
                    cancelAnimationFrame(animId);
                    return;
                }
                animId = requestAnimationFrame(draw);

                const w = canvas.width;
                const h = canvas.height;

                ctx.clearRect(0, 0, w, h);

                ctx.fillStyle = '#1e293b';
                ctx.beginPath();
                ctx.moveTo(0, 0);
                ctx.lineTo(w, 0);
                ctx.lineTo(w, 40);
                ctx.bezierCurveTo(w * 0.7, 45, w * 0.7, 60, w * 0.5, 60);
                ctx.bezierCurveTo(w * 0.3, 60, w * 0.3, 45, 0, 40);
                ctx.closePath();
                ctx.fill();

                ctx.strokeStyle = '#334155';
                ctx.lineWidth = 3;
                ctx.beginPath();
                ctx.moveTo(0, 40);
                ctx.bezierCurveTo(w * 0.3, 45, w * 0.3, 60, w * 0.5, 60);
                ctx.bezierCurveTo(w * 0.7, 60, w * 0.7, 45, w, 40);
                ctx.stroke();

                ctx.fillStyle = '#1e293b';
                ctx.beginPath();
                ctx.moveTo(0, h);
                ctx.lineTo(w, h);
                ctx.lineTo(w, h - 30);
                ctx.bezierCurveTo(w * 0.8, h - 35, w * 0.7, h - 45, w * 0.5, h - 45);
                ctx.bezierCurveTo(w * 0.3, h - 45, w * 0.2, h - 35, 0, h - 30);
                ctx.closePath();
                ctx.fill();

                ctx.strokeStyle = '#334155';
                ctx.beginPath();
                ctx.moveTo(0, h - 30);
                ctx.bezierCurveTo(w * 0.2, h - 35, w * 0.3, h - 45, w * 0.5, h - 45);
                ctx.bezierCurveTo(w * 0.7, h - 45, w * 0.8, h - 35, w, h - 30);
                ctx.stroke();

                receptors.forEach(rec => {
                    const rx = rec.x * w;
                    const ry = h - 45;

                    ctx.fillStyle = rec.active ? '#6366f1' : '#475569';
                    ctx.beginPath();
                    ctx.arc(rx, ry, 6, Math.PI, 0);
                    ctx.fill();

                    ctx.strokeStyle = rec.active ? '#a5b4fc' : '#64748b';
                    ctx.lineWidth = 1.5;
                    ctx.beginPath();
                    ctx.arc(rx, ry, 8, Math.PI, 0);
                    ctx.stroke();

                    if (rec.active) {
                        rec.activeTimer -= 1;
                        if (rec.activeTimer <= 0) rec.active = false;
                    }
                });

                synapseParticles.forEach((p, idx) => {
                    p.y += p.speed;
                    p.x += Math.sin(p.y * 0.1) * 0.5;

                    if (p.y >= h - 48 && p.y <= h - 42) {
                        receptors.forEach(rec => {
                            const rx = rec.x * w;
                            if (Math.abs(p.x - rx) < 18) {
                                rec.active = true;
                                rec.activeTimer = 40;
                                pspVoltage = Math.max(10, Math.min(95, pspVoltage + p.impact));
                                const bar = document.getElementById('synapse-voltage-bar');
                                if (bar) bar.style.height = `${pspVoltage}%`;
                            }
                        });
                        synapseParticles.splice(idx, 1);
                        return;
                    }

                    if (p.y > h) {
                        synapseParticles.splice(idx, 1);
                        return;
                    }

                    ctx.fillStyle = p.color;
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                    ctx.fill();

                    ctx.strokeStyle = p.glow;
                    ctx.lineWidth = 1;
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, p.size + 1.5, 0, Math.PI * 2);
                    ctx.stroke();
                });

                if (Math.abs(pspVoltage - 40) > 0.1) {
                    pspVoltage += (40 - pspVoltage) * 0.005;
                    const bar = document.getElementById('synapse-voltage-bar');
                    if (bar) bar.style.height = `${pspVoltage}%`;
                }
            }

            draw();
            window.addEventListener('resize', resizeCanvas);
        }

        window.triggerSynapse = (type) => {
            const canvas = document.getElementById('synapse-canvas');
            if (!canvas) return;

            const w = canvas.width;
            const descriptions = {
                'dopamine': {
                    desc: '<strong>Dopamina (Motivación y Placer)</strong>: Activación de receptores mesolímbicos. Estimula un potencial excitador (PPSE) moderado y refuerza el aprendizaje conductual positivo.',
                    color: '#eab308',
                    glow: 'rgba(234, 179, 8, 0.4)',
                    impact: 4
                },
                'serotonin': {
                    desc: '<strong>Serotonina (Estado de Ánimo y Estabilidad)</strong>: Modulación homeostática de receptores 5-HT. Regula el humor, el ciclo de sueño y modera los niveles de activación general.',
                    color: '#06b6d4',
                    glow: 'rgba(6, 182, 212, 0.4)',
                    impact: 2
                },
                'glutamate': {
                    desc: '<strong>Glutamato (Memoria y Excitación Fuerte)</strong>: El principal neurotransmisor excitador. Abre canales de Na+ y Ca2+, provocando un potencial excitador (PPSE) rápido y potente.',
                    color: '#f97316',
                    glow: 'rgba(249, 115, 22, 0.4)',
                    impact: 7
                },
                'gaba': {
                    desc: '<strong>GABA (Tranquilidad e Inhibición Cerebral)</strong>: Principal neurotransmisor inhibidor del Sistema Nervioso. Abre canales de Cloro (Cl-), hiperpolarizando la membrana (PPSI) y reduciendo el disparo neuronal.',
                    color: '#a855f7',
                    glow: 'rgba(168, 85, 247, 0.4)',
                    impact: -5
                }
            };

            const info = descriptions[type];
            const infoDiv = document.getElementById('synapse-info');
            if (infoDiv) infoDiv.innerHTML = info.desc;

            for (let i = 0; i < 18; i++) {
                synapseParticles.push({
                    x: (w * 0.3) + Math.random() * (w * 0.4),
                    y: 50 + Math.random() * 10,
                    size: 3 + Math.random() * 2,
                    speed: 2 + Math.random() * 2,
                    color: info.color,
                    glow: info.glow,
                    impact: info.impact
                });
            }
        };

        let apActive = false;
        let apProgress = 0;

        function initActionPotentialSimulator() {
            const canvas = document.getElementById('ap-canvas');
            if (!canvas) return;

            const ctx = canvas.getContext('2d');
            let animId;

            const resizeCanvas = () => {
                if (!canvas.parentElement) return;
                canvas.width = canvas.parentElement.clientWidth;
                canvas.height = canvas.parentElement.clientHeight;
            };
            resizeCanvas();

            function draw() {
                if (state.gameState !== 'brain3d' || state.brainSubTab !== 'action_potential') {
                    cancelAnimationFrame(animId);
                    return;
                }
                animId = requestAnimationFrame(draw);

                const w = canvas.width;
                const h = canvas.height;
                const graphY = h - 20;
                const graphH = 80;
                const membraneY = 40;

                ctx.clearRect(0, 0, w, h);

                ctx.fillStyle = '#1e293b';
                ctx.fillRect(10, membraneY - 4, w - 20, 8);
                ctx.fillStyle = '#0f172a';
                ctx.fillRect(10, membraneY - 1, w - 20, 2);

                const naChannelX = w * 0.35;
                const kChannelX = w * 0.65;

                let naOpen = false;
                let kOpen = false;
                let stateText = 'Reposo (-70 mV)';
                let infoText = 'Membrana en potencial de reposo. Los canales de Sodio y Potasio están cerrados.';
                let currentVoltage = -70;

                if (apActive) {
                    apProgress += 1.5;
                    if (apProgress >= 200) {
                        apProgress = 0;
                        apActive = false;
                        const playBtn = document.getElementById('ap-play-btn');
                        if (playBtn) playBtn.innerHTML = '<i data-lucide="play" class="w-4 h-4"></i> Disparar Impulso';
                        lucide.createIcons();
                    }
                }

                if (apActive) {
                    if (apProgress < 30) {
                        currentVoltage = -70 + (apProgress / 30) * 15;
                        stateText = 'Estímulo Inicial';
                        infoText = 'Un estímulo despolariza la membrana hasta alcanzar el umbral de disparo (-55 mV).';
                    } else if (apProgress >= 30 && apProgress < 75) {
                        naOpen = true;
                        const factor = (apProgress - 30) / 45;
                        currentVoltage = -55 + factor * 85;
                        stateText = 'Despolarización (+30 mV)';
                        infoText = '¡Umbral alcanzado! Los canales de Sodio (Na+) se abren masivamente, permitiendo la entrada de cargas positivas al interior celular.';
                    } else if (apProgress >= 75 && apProgress < 125) {
                        kOpen = true;
                        const factor = (apProgress - 75) / 50;
                        currentVoltage = 30 - factor * 110;
                        stateText = 'Repolarización';
                        infoText = 'Los canales de Sodio se cierran e inactivan. Se abren los canales de Potasio (K+), que sale rápidamente al exterior para restablecer la carga negativa.';
                    } else if (apProgress >= 125 && apProgress < 170) {
                        const factor = (apProgress - 125) / 45;
                        currentVoltage = -80 - Math.sin(factor * Math.PI) * 10;
                        stateText = 'Hiperpolarización (-90 mV)';
                        infoText = 'Los canales de Potasio se cierran lentamente, provocando que el potencial sea más negativo que el de reposo (periodo refractario).';
                    } else {
                        const factor = (apProgress - 170) / 30;
                        currentVoltage = -80 + factor * 10;
                        stateText = 'Restablecimiento';
                        infoText = 'La bomba de Sodio-Potasio restaura las concentraciones iónicas basales y el potencial de reposo de -70 mV.';
                    }
                }

                const stateLabel = document.getElementById('ap-state-label');
                if (stateLabel) stateLabel.innerText = `Estado: ${stateText}`;
                const infoDiv = document.getElementById('ap-info');
                if (infoDiv) infoDiv.innerHTML = infoText;

                ctx.fillStyle = naOpen ? '#22c55e' : '#ef4444';
                ctx.fillRect(naChannelX - 15, membraneY - 10, 30, 20);
                ctx.fillStyle = '#ffffff';
                ctx.font = 'bold 8px Inter';
                ctx.textAlign = 'center';
                ctx.fillText('Na+', naChannelX, membraneY + 3);

                ctx.fillStyle = kOpen ? '#22c55e' : '#ef4444';
                ctx.fillRect(kChannelX - 15, membraneY - 10, 30, 20);
                ctx.fillStyle = '#ffffff';
                ctx.font = 'bold 8px Inter';
                ctx.textAlign = 'center';
                ctx.fillText('K+', kChannelX, membraneY + 3);

                if (naOpen) {
                    ctx.fillStyle = '#eab308';
                    for (let i = 0; i < 4; i++) {
                        const ionY = (membraneY - 20) + ((apProgress * 3 + i * 20) % 40);
                        ctx.beginPath();
                        ctx.arc(naChannelX + (i % 2 === 0 ? 5 : -5), ionY, 3, 0, Math.PI * 2);
                        ctx.fill();
                    }
                }
                if (kOpen) {
                    ctx.fillStyle = '#06b6d4';
                    for (let i = 0; i < 4; i++) {
                        const ionY = (membraneY + 20) - ((apProgress * 3 + i * 20) % 40);
                        ctx.beginPath();
                        ctx.arc(kChannelX + (i % 2 === 0 ? 5 : -5), ionY, 3, 0, Math.PI * 2);
                        ctx.fill();
                    }
                }

                ctx.fillStyle = '#94a3b8';
                ctx.font = 'bold 7px Inter';
                ctx.fillText('EXTERIOR CELULAR', 30, membraneY - 15);
                ctx.fillText('INTERIOR CELULAR (AXÓN)', 30, membraneY + 25);

                const startX = w * 0.15;
                const endX = w * 0.85;
                const graphW = endX - startX;

                ctx.strokeStyle = '#334155';
                ctx.lineWidth = 1;
                ctx.beginPath();
                ctx.moveTo(startX, graphY - graphH);
                ctx.lineTo(startX, graphY);
                ctx.lineTo(endX, graphY);
                ctx.stroke();

                const getVoltageY = (v) => {
                    const fraction = (v + 90) / 130;
                    return graphY - fraction * graphH;
                };

                ctx.strokeStyle = '#1e293b';
                ctx.lineWidth = 1;
                ctx.setLineDash([4, 4]);

                ctx.beginPath();
                ctx.moveTo(startX, getVoltageY(-70));
                ctx.lineTo(endX, getVoltageY(-70));
                ctx.stroke();

                ctx.beginPath();
                ctx.moveTo(startX, getVoltageY(0));
                ctx.lineTo(endX, getVoltageY(0));
                ctx.stroke();

                ctx.beginPath();
                ctx.moveTo(startX, getVoltageY(30));
                ctx.lineTo(endX, getVoltageY(30));
                ctx.stroke();
                ctx.setLineDash([]);

                ctx.fillStyle = '#64748b';
                ctx.font = '7px Inter';
                ctx.textAlign = 'right';
                ctx.fillText('+30 mV', startX - 5, getVoltageY(30) + 2);
                ctx.fillText('0 mV', startX - 5, getVoltageY(0) + 2);
                ctx.fillText('-70 mV', startX - 5, getVoltageY(-70) + 2);
                ctx.fillText('-90 mV', startX - 5, getVoltageY(-90) + 2);

                ctx.strokeStyle = '#475569';
                ctx.lineWidth = 2;
                ctx.beginPath();

                const getCurvePoint = (progress) => {
                    const cx = startX + (progress / 200) * graphW;
                    let cy;
                    if (progress < 30) {
                        cy = getVoltageY(-70 + (progress / 30) * 15);
                    } else if (progress >= 30 && progress < 75) {
                        const factor = (progress - 30) / 45;
                        cy = getVoltageY(-55 + factor * 85);
                    } else if (progress >= 75 && progress < 125) {
                        const factor = (progress - 75) / 50;
                        cy = getVoltageY(30 - factor * 110);
                    } else if (progress >= 125 && progress < 170) {
                        const factor = (progress - 125) / 45;
                        const v = -80 - Math.sin(factor * Math.PI) * 10;
                        cy = getVoltageY(v);
                    } else {
                        const factor = (progress - 170) / 30;
                        cy = getVoltageY(-80 + factor * 10);
                    }
                    return { x: cx, y: cy };
                };

                for (let p = 0; p <= 200; p++) {
                    const pt = getCurvePoint(p);
                    if (p === 0) ctx.moveTo(pt.x, pt.y);
                    else ctx.lineTo(pt.x, pt.y);
                }
                ctx.stroke();

                if (apActive) {
                    ctx.strokeStyle = '#eab308';
                    ctx.lineWidth = 3;
                    ctx.beginPath();
                    for (let p = 0; p <= apProgress; p++) {
                        const pt = getCurvePoint(p);
                        if (p === 0) ctx.moveTo(pt.x, pt.y);
                        else ctx.lineTo(pt.x, pt.y);
                    }
                    ctx.stroke();

                    const curPt = getCurvePoint(apProgress);
                    ctx.fillStyle = '#facc15';
                    ctx.beginPath();
                    ctx.arc(curPt.x, curPt.y, 4, 0, Math.PI * 2);
                    ctx.fill();

                    ctx.strokeStyle = '#ffffff';
                    ctx.lineWidth = 1;
                    ctx.beginPath();
                    ctx.arc(curPt.x, curPt.y, 4, 0, Math.PI * 2);
                    ctx.stroke();
                }
            }

            draw();
            window.addEventListener('resize', resizeCanvas);
        }

        window.toggleAPSimulation = () => {
            const playBtn = document.getElementById('ap-play-btn');
            if (apActive) {
                apActive = false;
                apProgress = 0;
                if (playBtn) playBtn.innerHTML = '<i data-lucide="play" class="w-4 h-4"></i> Disparar Impulso';
            } else {
                apActive = true;
                apProgress = 0;
                if (playBtn) playBtn.innerHTML = '<i data-lucide="square" class="w-4 h-4"></i> Detener';
            }
            lucide.createIcons();
        };

        checkAuthOnLoad();
    </script>
