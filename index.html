<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAIMAP Plataforma de Exámenes</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .correct-bg { background-color: #dcfce7; border-color: #22c55e; color: #166534; }
        .wrong-bg { background-color: #fee2e2; border-color: #ef4444; color: #991b1b; }
        .fade-in { animation: fadeIn 0.3s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        /* Flashcard Styles */
        .flashcard-container {
            perspective: 1000px;
        }
        .flashcard {
            width: 100%;
            height: 340px;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .flashcard.flipped {
            transform: rotateY(180deg);
        }
        .flashcard-front, .flashcard-back {
            width: 100%;
            height: 100%;
            position: absolute;
            backface-visibility: hidden;
            border-radius: 1.5rem;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 2.5rem;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.05), 0 2px 4px -2px rgb(0 0 0 / 0.05);
            border: 1px solid #e2e8f0;
        }
        .flashcard-front {
            background-color: #ffffff;
            color: #1e293b;
        }
        .flashcard-back {
            background-color: #f8fafc;
            color: #1e293b;
            transform: rotateY(180deg);
            overflow-y: auto;
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 min-h-screen">
    <div id="app" class="min-h-screen flex flex-col"></div>
    <script>
        // --- CONSTANTES Y ESTADO ---
        const AVAILABLE_SUBJECTS = [
            { id: "psicologia-de-la-memoria", name: "Psicología de la Memoria", year: "1º", folder: "Psicología-Memoria" },
            { id: "psicologia-del-desarrollo", name: "Psicología del Desarrollo", year: "1º", folder: "Infancia-Adolescencia" },
            { id: "historia-de-la-psicologia", name: "Historia de la Psicología", year: "1º", folder: "Historia-Psicología" },
            { id: "psicologia-social", name: "Psicología Social", year: "1º", folder: "Psicología-Social" },
            { id: "psicologia-de-la-atencion-y-percepcion", name: "Psicología de la Atención y Percepción", year: "1º", folder: "Atención-Percepción" },
            { id: "psicologia-de-la-motivacion-y-emocion", name: "Psicología de la Motivación y Emoción", year: "1º", folder: "Motivación-Emoción" },
            { id: "psicologia-del-aprendizaje", name: "Psicología del Aprendizaje", year: "1º", folder: "Psicología-Aprendizaje" },
            { id: "bases-biologicas-del-comportamiento", name: "Bases Biológicas del Comportamiento", year: "1º", folder: "Bases-Biológicas" },
            { id: "psicologia-clinica", name: "Psicología Clínica", year: "3º", folder: "Psicología-Clínica" },
            { id: "psicologia-del-trabajo", name: "Psicología del Trabajo", year: "3º", folder: "Psicología-Trabajo" }
        ];

        // Subtítulos de los temas por asignatura
        const THEME_SUBTITLES = {
            'psicologia-del-aprendizaje': {
                '1.1': 'Concepto y Definición',
                '1.2': 'Historia y Método',
                '2.1': 'Aprendizaje Asociativo',
                '2.2': 'Condicionamiento Clásico',
                '3.1': 'Inicios del Condicionamiento Instrumental',
                '3.2': 'Condicionamiento Operante',
                '4.1': 'Psicología Cognitiva',
                '4.2': 'Modelos Computacionales y Constructivismo',
                '4.3': 'Gestalt, Piaget y Vygotski',
                '5': 'Aprendizaje Social y Vicario',
                '6': 'Aprendizaje de Habilidades Motoras'
            },
            'historia-de-la-psicologia': {
                '1': 'Los Orígenes de la Psicología Científica',
                '2.1': 'El Funcionalismo y el Conductismo',
                '2.2': 'La Gestalt y el Psicoanálisis',
                '3.1': 'El Neoconductismo',
                '3.2': 'La Psicología Humanista y Cognitiva',
                '4.1': 'La Psicología Científica Contemporánea',
                '4.2': 'Psicología Aplicada y Profesional',
                '5': 'La Psicología en España',
                '6': 'Tendencias Actuales en Psicología'
            },
            'bases-biologicas-del-comportamiento': {
                '1': 'Concepto, Disciplinas y Métodos',
                '2': 'Desarrollo y Anatomía del SN',
                '3': 'Células del Sistema Nervioso',
                '4': 'Sinapsis y Neurotransmisión',
                '5': 'Genética de la Conducta'
            },
            'psicologia-social': {
                '1': 'Introducción, Historia y Método',
                '2': 'Cognición Social',
                '3': 'Atribución Social',
                '4': 'Autoconcepto e Identidad',
                '5': 'Actitudes',
                '6': 'Estereotipos, Prejuicio y Discriminación'
            },
            'psicologia-de-la-atencion-y-percepcion': {
                '1': 'Introducción y Conceptos Básicos',
                '2.1': 'Historia y Enfoque Psicofísico',
                '2.2': 'Teorías de la Percepción',
                '3.1': 'Percepción Visual',
                '3.2': 'Percepción del Color',
                '4.1': 'Percepción Táctil y Somestesia',
                '4.2': 'Percepción Química: Gusto y Olfato',
                '5': 'Introducción a la Atención',
                '6': 'Modelos de Atención Selectiva',
                '7': 'Tipos de Atención',
                '8': 'Sesgos e Ilusiones Perceptivas'
            }
        };

        let ALL_QUESTIONS = [];
        let subjectName = "Examen Autocargado";

        let state = {
            gameState: 'select',      // 'select' (dashboard/menu), 'playing', 'finished'
            selectedSubjectId: null,  // Asignatura seleccionada para ver sus carpetas/temas
            mode: 'sim',              // 'sim' (repaso), 'exam' (examen)
            questionCount: 30,      
            activeQuestions: [],
            currentIndex: 0,
            userAnswers: {},
            simFeedback: null,
            hiddenOptions: [],
            timeLeft: 3600, 
            timerInterval: null,
            timeSpentSeconds: 0,
            playInterval: null,
            filterYear: 'Todos',      // 'Todos', '1º', '3º'
            showUploader: false,      // Mostrar/ocultar zona de carga manual
            currentTema: null,
            studyMode: 'test',        // 'test', 'trainer', 'flashcards'
            trainerQuestions: [],
            flashcardQuestions: [],
            hasTrainer: false,
            hasFlashcards: false,
            flashcardsProgress: { known: [], review: [], current: 0 },
            trainerAnswers: {},
            trainerChecked: {}
        };

        // --- SISTEMA DE DESBLOQUEOS (localStorage) ---
        function getUnlockedData() {
            try {
                let data = JSON.parse(localStorage.getItem('saimap_unlocked')) || {};
                let modified = false;

                // Normalización de claves legacy (ej: "psicologia-del-aprendizaje-tema-1-1")
                for (const key of Object.keys(data)) {
                    if (key.includes('-tema-')) {
                        const parts = key.split('-tema-');
                        const realSubjectId = parts[0];
                        const temaPart = parts[1].replace(/-/g, '.'); // "1-1" -> "1.1"
                        
                        const subjectMeta = AVAILABLE_SUBJECTS.find(s => s.id === realSubjectId);
                        const realName = subjectMeta ? subjectMeta.name : realSubjectId.replace(/[-_]/g, ' ').replace(/\b\w/g, c => c.toUpperCase());
                        const realYear = subjectMeta ? subjectMeta.year : '1º';

                        if (!data[realSubjectId]) {
                            data[realSubjectId] = {
                                name: realName,
                                year: realYear,
                                unlockedTemas: []
                            };
                        }

                        const temaLabel = `Tema ${temaPart}`;
                        if (!data[realSubjectId].unlockedTemas.includes(temaLabel)) {
                            data[realSubjectId].unlockedTemas.push(temaLabel);
                        }

                        delete data[key];
                        modified = true;
                    }
                }

                if (modified) {
                    localStorage.setItem('saimap_unlocked', JSON.stringify(data));
                }

                return data;
            } catch(e) {
                return {};
            }
        }

        function unlockSubjectAndTema(id, tema) {
            const unlocked = getUnlockedData();
            const subjectMeta = AVAILABLE_SUBJECTS.find(s => s.id === id);
            
            if (!unlocked[id]) {
                unlocked[id] = {
                    name: subjectMeta ? subjectMeta.name : id.replace(/[-_]/g, ' ').replace(/\b\w/g, c => c.toUpperCase()),
                    year: subjectMeta ? subjectMeta.year : '1º',
                    unlockedTemas: []
                };
            }

            const key = tema ? `Tema ${tema}` : 'Examen Final';
            if (!unlocked[id].unlockedTemas.includes(key)) {
                unlocked[id].unlockedTemas.push(key);
            }

            localStorage.setItem('saimap_unlocked', JSON.stringify(unlocked));
        }

        // --- MANEJO DE HISTORIAL (localStorage) ---
        function getHistory() {
            try {
                return JSON.parse(localStorage.getItem('saimap_history')) || [];
            } catch(e) {
                return [];
            }
        }

        function saveAttempt(attempt) {
            const history = getHistory();
            history.unshift(attempt);
            localStorage.setItem('saimap_history', JSON.stringify(history));
        }

        function clearHistory() {
            if (confirm("¿Estás seguro de que quieres borrar todo tu historial de exámenes? Esto no se puede deshacer.")) {
                localStorage.removeItem('saimap_history');
                render();
            }
        }

        // --- CARGA DE DATOS ---
        const urlParams = new URLSearchParams(window.location.search);
        const asignaturaParam = urlParams.get('asignatura');
        const temaParam = urlParams.get('tema');

        if (asignaturaParam) {
            unlockSubjectAndTema(asignaturaParam, temaParam);
            loadSubject(asignaturaParam, temaParam, false);
        }

        function loadSubject(id, tema = null, updateHistoryState = true) {
            const subject = AVAILABLE_SUBJECTS.find(s => s.id === id);
            const folder = subject ? subject.folder : 'Otros';
            const year = subject ? subject.year : '1º';

            // Si es un tema independiente, redirigir a su archivo de aprendizaje específico
            if (tema) {
                let shortId = id;
                if (id === 'psicologia-del-aprendizaje') shortId = 'aprendizaje';
                else if (id === 'bases-biologicas-del-comportamiento') shortId = 'psicobiologia';
                else if (id === 'historia-de-la-psicologia') shortId = 'historia';
                else if (id.startsWith('psicologia-de-la-')) shortId = id.replace('psicologia-de-la-', '');
                else if (id.startsWith('psicologia-del-')) shortId = id.replace('psicologia-del-', '');
                else if (id.startsWith('psicologia-')) shortId = id.replace('psicologia-', '');
                
                const temaFilePart = String(tema).replace(/\./g, '-');
                const targetUrl = `temas/${year}/${folder}/${shortId}-tema-${temaFilePart}.html`;
                window.location.href = targetUrl;
                return;
            }

            let title = subject ? subject.name : id.replace(/[-_]/g, ' ').replace(/\b\w/g, c => c.toUpperCase());
            
            state.currentTema = tema;
            if (tema) {
                title += ` - Tema ${tema}`;
            }
            subjectName = title;
            
            if (updateHistoryState) {
                let query = `?asignatura=${id}`;
                if (tema) query += `&tema=${tema}`;
                window.history.pushState(null, '', query);
            }

            // URL del archivo JSON: intenta cargar archivo específico del tema, si no, carga el global
            let fetchUrl = `json/${year}/${folder}/${id}.json`;
            if (tema) {
                const temaFilePart = String(tema).replace(/\./g, '-');
                fetchUrl = `json/${year}/${folder}/${id}-tema-${temaFilePart}.json`;
            }

            fetch(fetchUrl)
                .then(res => {
                    if (!res.ok) {
                        if (tema) {
                            console.log(`No se encontró el JSON del tema, usando general: json/${id}.json`);
                            return fetch(`json/${id}.json`);
                        }
                        throw new Error("No se pudo encontrar el archivo de preguntas en el servidor.");
                    }
                    return res.json();
                })
                .then(data => {
                    initQuestions(data);
                })
                .catch(err => {
                    console.error(err);
                    alert(`Error cargando asignatura: ${err.message}\n\nPor favor, accede desde un enlace válido en Skool.`);
                    appMethods.backToSelector();
                });
        }

        function handleLocalFile(event) {
            const file = event.target.files[0];
            if (!file) return;

            subjectName = file.name.replace(/\.[^/.]+$/, "").replace(/[-_]/g, ' ').replace(/\b\w/g, c => c.toUpperCase());
            state.currentTema = null;

            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const data = JSON.parse(e.target.result);
                    initQuestions(data);
                } catch(err) {
                    alert("Error leyendo el archivo JSON.");
                }
            };
            reader.readAsText(file);
        }

        function initQuestions(data) {
            state.trainerQuestions = [];
            state.flashcardQuestions = [];
            state.hasTrainer = false;
            state.hasFlashcards = false;
            state.studyMode = 'test'; 

            let questions = [];

            if (data && typeof data === 'object' && !Array.isArray(data)) {
                if (Array.isArray(data.quiz)) {
                    questions = data.quiz;
                }
                if (Array.isArray(data.trainer)) {
                    state.trainerQuestions = data.trainer;
                    state.hasTrainer = true;
                }
                if (Array.isArray(data.flashcards)) {
                    state.flashcardQuestions = data.flashcards;
                    state.hasFlashcards = true;
                }
            } else if (Array.isArray(data)) {
                if (data.length > 0) {
                    if (Array.isArray(data[0])) {
                        questions = data.map(q => {
                            let questionText = q[0];
                            let correctIndex = -1;
                            let options = q.slice(1).map((optText, optIdx) => {
                                if (optText.includes('(correcta)')) {
                                    correctIndex = optIdx;
                                    return optText.replace(/\s*\(correcta\)/i, '').trim();
                                }
                                return optText;
                            });
                            if (correctIndex === -1) {
                                correctIndex = 0; 
                            }
                            return {
                                q: questionText,
                                options: options,
                                correct: correctIndex
                            };
                        });
                    } else {
                        questions = data;
                    }
                }
            }

            ALL_QUESTIONS = questions.map((item, idx) => {
                const normQ = item.q || item.question || '';
                const normCorrect = item.correct !== undefined ? item.correct : (item.correctIndex !== undefined ? item.correctIndex : 0);
                return {
                    ...item,
                    id: idx + 1,
                    q: normQ,
                    correct: normCorrect
                };
            });
            state.gameState = 'menu';
            state.questionCount = Math.min(30, ALL_QUESTIONS.length);
            render();
        }

        const shuffleArray = (array) => {
            const newArray = [...array];
            for (let i = newArray.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [newArray[i], newArray[j]] = [newArray[j], newArray[i]];
            }
            return newArray;
        };

        // --- MÉTODOS DEL JUEGO ---
        const appMethods = {
            setQuestionCount: (n) => { state.questionCount = n; render(); },
            startExam: (selectedMode) => {
                state.mode = selectedMode;
                let count = Math.min(state.questionCount, ALL_QUESTIONS.length);
                let selected = shuffleArray(ALL_QUESTIONS).slice(0, count);

                state.activeQuestions = selected.map(q => {
                    let opts = q.options.map((text, idx) => ({ text, isCorrect: idx === q.correct }));
                    let shuffledOpts = shuffleArray(opts);
                    return {
                        ...q,
                        options: shuffledOpts.map(o => o.text),
                        correctIndex: shuffledOpts.findIndex(o => o.isCorrect)
                    };
                });

                state.gameState = 'playing';
                state.currentIndex = 0;
                state.userAnswers = {};
                state.simFeedback = null;
                state.hiddenOptions = [];
                state.timeSpentSeconds = 0;
                
                if(state.playInterval) clearInterval(state.playInterval);
                state.playInterval = setInterval(() => {
                    state.timeSpentSeconds++;
                }, 1000);

                if (state.mode === 'exam') {
                    state.timeLeft = 3600; 
                    if(state.timerInterval) clearInterval(state.timerInterval);
                    state.timerInterval = setInterval(() => {
                        state.timeLeft--;
                        if(state.timeLeft <= 0) {
                            clearInterval(state.timerInterval);
                            appMethods.finishExam();
                        } else {
                            renderTimer();
                        }
                    }, 1000);
                }
                render();
            },
            handleAnswer: (optionIndex) => {
                const currentQ = state.activeQuestions[state.currentIndex];
                if (state.mode === 'sim' && state.simFeedback) return;
                
                if (state.mode === 'sim') {
                    state.simFeedback = { isCorrect: optionIndex === currentQ.correctIndex, selected: optionIndex };
                }
                state.userAnswers[currentQ.id] = optionIndex;
                render();
            },
            nextQuestion: () => {
                if (state.currentIndex < state.activeQuestions.length - 1) {
                    state.currentIndex++;
                    state.simFeedback = null;
                    state.hiddenOptions = [];
                    render();
                } else {
                    appMethods.finishExam();
                }
            },
            prevQuestion: () => {
                if (state.currentIndex > 0) {
                    state.currentIndex--;
                    state.simFeedback = null; 
                    state.hiddenOptions = [];
                    render();
                }
            },
            finishExam: () => {
                if(state.timerInterval) clearInterval(state.timerInterval);
                if(state.playInterval) clearInterval(state.playInterval);
                state.gameState = 'finished';

                const { correct, incorrect, blank, score } = calculateScore();
                saveAttempt({
                    subject: subjectName,
                    date: new Date().toISOString(),
                    mode: state.mode,
                    correct,
                    incorrect,
                    blank,
                    score: Number(score.toFixed(1)),
                    total: state.activeQuestions.length,
                    timeSpent: formatTime(state.timeSpentSeconds)
                });

                render();
            },
            useHint: () => {
                if (state.hiddenOptions.length > 0) return;
                const currentQ = state.activeQuestions[state.currentIndex];
                const wrongs = currentQ.options.map((_, i) => i).filter(i => i !== currentQ.correctIndex);
                state.hiddenOptions = [wrongs[Math.floor(Math.random() * wrongs.length)]];
                
                if (currentQ.hint) {
                    alert("PISTA: " + currentQ.hint);
                }
                render();
            },
            restart: () => {
                if (state.timerInterval) clearInterval(state.timerInterval);
                if (state.playInterval) clearInterval(state.playInterval);
                state.gameState = 'menu';
                render();
            },
            backToSelector: () => {
                if (state.timerInterval) clearInterval(state.timerInterval);
                if (state.playInterval) clearInterval(state.playInterval);
                state.gameState = 'select';
                ALL_QUESTIONS = [];
                state.currentTema = null;
                window.history.pushState(null, '', window.location.pathname);
                render();
            },
            enterSubjectFolder: (id) => {
                state.selectedSubjectId = id;
                state.gameState = 'subject_folder';
                render();
            },
            setFilterYear: (year) => {
                state.filterYear = year;
                render();
            },
            toggleUploader: () => {
                state.showUploader = !state.showUploader;
                render();
            },
            setStudyMode: (mode) => {
                state.studyMode = mode;
                if (mode === 'trainer') {
                    state.questionCount = Math.min(15, state.trainerQuestions.length);
                } else if (mode === 'test') {
                    state.questionCount = Math.min(30, ALL_QUESTIONS.length);
                }
                render();
            },
            startTrainer: () => {
                let count = Math.min(state.questionCount, state.trainerQuestions.length);
                state.activeQuestions = shuffleArray(state.trainerQuestions).slice(0, count).map((q, idx) => ({ id: idx + 1, ...q }));
                state.gameState = 'playing';
                state.currentIndex = 0;
                state.trainerAnswers = {};
                state.trainerChecked = {};
                state.timeSpentSeconds = 0;
                if (state.playInterval) clearInterval(state.playInterval);
                state.playInterval = setInterval(() => {
                    state.timeSpentSeconds++;
                }, 1000);
                render();
            },
            handleTrainerInput: (val) => {
                state.trainerAnswers[state.currentIndex] = val;
            },
            checkTrainerAnswer: () => {
                state.trainerChecked[state.currentIndex] = true;
                render();
            },
            nextTrainerQuestion: () => {
                if (state.currentIndex < state.activeQuestions.length - 1) {
                    state.currentIndex++;
                    render();
                } else {
                    appMethods.finishTrainer();
                }
            },
            finishTrainer: () => {
                if (state.playInterval) clearInterval(state.playInterval);
                state.gameState = 'finished';
                render();
            },
            startFlashcards: () => {
                state.activeQuestions = shuffleArray(state.flashcardQuestions);
                state.gameState = 'playing';
                state.flashcardsProgress = {
                    known: [],
                    review: [],
                    current: 0
                };
                render();
            },
            flipCard: () => {
                const card = document.getElementById('active-flashcard');
                if (card) card.classList.toggle('flipped');
            },
            markCardKnown: (idx) => {
                const q = state.activeQuestions[idx];
                if (!state.flashcardsProgress.known.includes(q.q)) state.flashcardsProgress.known.push(q.q);
                state.flashcardsProgress.review = state.flashcardsProgress.review.filter(x => x !== q.q);
                appMethods.nextFlashcard();
            },
            markCardReview: (idx) => {
                const q = state.activeQuestions[idx];
                if (!state.flashcardsProgress.review.includes(q.q)) state.flashcardsProgress.review.push(q.q);
                state.flashcardsProgress.known = state.flashcardsProgress.known.filter(x => x !== q.q);
                appMethods.nextFlashcard();
            },
            nextFlashcard: () => {
                if (state.flashcardsProgress.current < state.activeQuestions.length - 1) {
                    state.flashcardsProgress.current++;
                    render();
                } else {
                    alert('¡Has completado todas las fichas de esta sesión!');
                    appMethods.backToSelector();
                }
            },
            prevFlashcard: () => {
                if (state.flashcardsProgress.current > 0) {
                    state.flashcardsProgress.current--;
                    render();
                }
            }
        };

        const calculateScore = () => {
            let correct = 0, incorrect = 0, blank = 0;
            state.activeQuestions.forEach(q => {
                const ans = state.userAnswers[q.id];
                if (ans === undefined) blank++;
                else if (ans === q.correctIndex) correct++;
                else incorrect++;
            });
            const score = (correct * 1) - (incorrect * 0.5);
            return { correct, incorrect, blank, score: Math.max(0, score) };
        };

        // --- VISTAS / RENDERS ---

        function renderBrandFooter() {
            return `
                <div class="mt-auto py-8 text-center opacity-30">
                    <div class="flex items-center justify-center gap-2 text-xs font-bold tracking-widest text-slate-400">
                        <span class="w-1.5 h-1.5 rounded-full bg-slate-400"></span>
                        SAIMAP ACADEMY
                        <span class="w-1.5 h-1.5 rounded-full bg-slate-400"></span>
                    </div>
                </div>
            `;
        }

        function formatTime(secs) {
            const m = Math.floor(secs / 60);
            const s = secs % 60;
            return `${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
        }

        function renderTimer() {
            const timerEl = document.getElementById('exam-timer');
            if (timerEl) {
                timerEl.innerText = formatTime(state.timeLeft);
                if (state.timeLeft < 300) {
                    timerEl.classList.add('text-red-500', 'animate-pulse');
                }
            }
        }

        // Vista de Carpeta de la Asignatura (Temas y Exámenes)
        function renderSubjectFolder() {
            const unlocked = getUnlockedData();
            const subjectId = state.selectedSubjectId;
            const sub = unlocked[subjectId];
            
            if (!sub) {
                state.gameState = 'select';
                setTimeout(render, 0);
                return '';
            }

            const sMeta = AVAILABLE_SUBJECTS.find(x => x.id === subjectId);
            const year = sMeta ? sMeta.year : '1º';

            const temas = sub.unlockedTemas.filter(t => t.startsWith('Tema'));
            const hasExamen = sub.unlockedTemas.includes('Examen Final');

            temas.sort((a, b) => {
                const aNum = parseFloat(a.replace('Tema ', ''));
                const bNum = parseFloat(b.replace('Tema ', ''));
                return aNum - bNum;
            });

            let temasListHTML = '';
            if (temas.length === 0) {
                temasListHTML = `
                    <div class="bg-white border border-slate-200 border-dashed rounded-3xl p-8 text-center text-slate-500">

                            const temaNum = t.replace('Tema ', '');

            } else if (state.studyMode === 'trainer') {

                            <i data-lucide="play" class="w-5 h-5"></i> Empezar Entrenamiento de Memoria

                        </div>
                        
                        <button onclick="appMethods.startFlashcards()" class="w-full py-4 bg-indigo-600 hover:bg-indigo-700 text-white rounded-xl font-bold shadow-lg shadow-indigo-100 transition-all flex items-center justify-center gap-2">
                            <i data-lucide="play" class="w-5 h-5"></i> Empezar Sesión de Fichas
                        </button>

            }

            return `
                <div class="flex items-center justify-center p-4 flex-grow fade-in">
                    <div class="max-w-2xl w-full bg-white rounded-2xl shadow-xl overflow-hidden border border-slate-200">

                            <div class="absolute top-0 left-0 w-full h-2 bg-gradient-to-r from-blue-500 via-indigo-500 to-purple-500"></div>
                            <button onclick="appMethods.backToSelector()" class="absolute top-4 left-4 text-xs font-bold text-white/50 hover:text-white flex items-center gap-1">
                                <i data-lucide="arrow-left" class="w-3.5 h-3.5"></i> Volver al Catálogo
                            </button>

                                </div>
                                <h2 class="text-xs font-bold tracking-[0.3em] text-indigo-200 mb-2">SAIMAP EVAL</h2>
                                <h1 class="text-3xl font-black mb-2 tracking-tight text-white leading-tight">${subjectName}</h1>

        }

        // Ejecución del Examen
        function renderPlaying() {
            const currentQ = state.activeQuestions[state.currentIndex];
            const progress = ((state.currentIndex + 1) / state.activeQuestions.length) * 100;
            const isSim = state.mode === 'sim';

            return `
                <div class="flex flex-col items-center p-4 w-full flex-grow fade-in">
                    <div class="w-full max-w-3xl mb-6 flex justify-between items-center text-slate-400">
                        <div class="flex flex-col">
                            <span class="text-[10px] font-black tracking-widest uppercase text-slate-300">${subjectName}</span>
                            <span class="text-sm font-bold text-slate-700">Pregunta ${state.currentIndex + 1} <span class="text-slate-300 font-normal">/ ${state.activeQuestions.length}</span></span>
                        </div>
                        <div class="flex items-center gap-2">
                            ${!isSim ? `
                            <div class="flex items-center gap-2 px-3 py-1 bg-slate-100 rounded-full text-slate-600 font-mono font-bold">
                                <i data-lucide="clock" class="w-4 h-4"></i>
                                <span id="exam-timer">${formatTime(state.timeLeft)}</span>

                            ` : ''}
                            <button onclick="appMethods.finishExam()" title="Terminar y Corregir ahora" class="flex items-center gap-1 px-3 py-1 rounded-full text-xs font-bold border bg-red-50 border-red-200 text-red-600 hover:bg-red-100 transition-colors cursor-pointer">
                                <i data-lucide="check-square" class="w-3 h-3"></i> Corregir
                            </button>
                            <span class="px-3 py-1 rounded-full text-xs font-bold border ${isSim ? 'bg-green-50 border-green-200 text-green-700' : 'bg-indigo-50 border-indigo-200 text-indigo-700'}">
                                ${isSim ? 'REPASO' : 'EXAMEN'}
                            </span>
                        </div>
                    </div>

                    <div class="w-full max-w-3xl h-1.5 bg-slate-100 rounded-full mb-8 overflow-hidden">
                        <div class="h-full bg-slate-800 transition-all duration-500 ease-out" style="width: ${progress}%"></div>
                    </div>

                    <div class="w-full max-w-3xl bg-white rounded-3xl shadow-sm border border-slate-200 p-8 md:p-10 mb-6 relative">
                        <h2 class="text-lg md:text-xl font-bold text-slate-800 mb-8 leading-relaxed">${currentQ.question || currentQ.q}</h2>
                        
                        <div class="space-y-3">
                            ${currentQ.options.map((option, idx) => {
                                if (state.hiddenOptions.includes(idx)) return ''; 

                                let statusClass = "border-slate-100 bg-slate-50 text-slate-600 hover:border-slate-300 hover:bg-white";
                                let iconContent = String.fromCharCode(65 + idx);
                                let iconClass = "bg-white border-slate-200 text-slate-400";

                                if (isSim && state.simFeedback) {
                                    if (idx === currentQ.correctIndex) {
                                        statusClass = "correct-bg border-green-500 ring-1 ring-green-500";
                                        iconClass = "bg-green-500 text-white border-green-500";
                                        iconContent = `<i data-lucide="check" class="w-4 h-4"></i>`;
                                    } else if (state.simFeedback.selected === idx) {
                                        statusClass = "wrong-bg border-red-500";
                                        iconClass = "bg-red-500 text-white border-red-500";
                                        iconContent = `<i data-lucide="x" class="w-4 h-4"></i>`;
                                    } else {
                                        statusClass = "opacity-40 border-transparent bg-transparent";
                                    }
                                } else if (!isSim && state.userAnswers[currentQ.id] === idx) {
                                    statusClass = "bg-slate-800 border-slate-800 text-white shadow-lg shadow-slate-200";
                                    iconClass = "bg-white/20 text-white border-transparent";
                                }

                                return `
                                <button onclick="appMethods.handleAnswer(${idx})" ${(isSim && state.simFeedback) ? 'disabled' : ''} 
                                    class="w-full text-left p-4 rounded-xl border-2 transition-all duration-200 flex items-start gap-4 font-medium group ${statusClass}">
                                    <div class="w-8 h-8 rounded-lg border-2 flex-shrink-0 flex items-center justify-center text-xs font-bold transition-colors ${iconClass}">
                                        ${iconContent}
                                    </div>
                                    <span class="mt-0.5 leading-snug">${option}</span>
                                </button>`;
                            }).join('')}
                        </div>
                        
                        ${isSim && state.simFeedback && currentQ.explanation ? `
                            <div class="mt-8 p-4 bg-blue-50 border border-blue-200 rounded-xl text-sm text-blue-800">
                                <div class="font-bold flex items-center gap-2 mb-1"><i data-lucide="info" class="w-4 h-4"></i> Explicación:</div>
                                ${currentQ.explanation}
                            </div>
                        ` : ''}
                    </div>

                    <div class="w-full max-w-3xl flex justify-between items-center gap-4">
                        <button onclick="appMethods.prevQuestion()" ${(state.currentIndex === 0) ? 'disabled' : ''} 
                            class="flex items-center gap-2 px-5 py-3 rounded-xl font-bold transition-all text-sm ${(state.currentIndex === 0) ? 'opacity-0' : 'text-slate-400 hover:text-slate-600 hover:bg-slate-100'}">
                            <i data-lucide="arrow-left" class="w-4 h-4"></i> Anterior
                        </button>
                        
                        <div class="flex gap-2">
                             ${(isSim && !state.simFeedback) ? `
                                <button onclick="appMethods.useHint()" ${state.hiddenOptions.length > 0 ? 'disabled' : ''} 
                                    class="flex items-center gap-2 px-4 py-3 text-amber-500 font-bold rounded-xl hover:bg-amber-50 transition-all text-sm ${state.hiddenOptions.length > 0 ? 'opacity-30 grayscale' : ''}">
                                    <i data-lucide="zap" class="w-4 h-4"></i> ${currentQ.hint ? 'Pista' : '50/50'}
                                </button>
                             ` : ''}
                        </div>

                        <button onclick="${state.currentIndex === state.activeQuestions.length - 1 ? 'appMethods.finishExam()' : 'appMethods.nextQuestion()'}" 
                            class="flex items-center gap-2 px-8 py-3 bg-slate-900 text-white rounded-xl font-bold shadow-lg shadow-slate-200 hover:bg-slate-800 hover:-translate-y-0.5 transition-all text-sm ${(isSim && !state.simFeedback) ? 'opacity-50 grayscale cursor-not-allowed' : ''}" ${(isSim && !state.simFeedback) ? 'disabled' : ''}>
                            ${state.currentIndex === state.activeQuestions.length - 1 ? 'Finalizar' : 'Siguiente'} <i data-lucide="arrow-right" class="w-4 h-4"></i>
                        </button>
                    </div>
                </div>
            `;
        }

        // Resultados del Examen
        function renderFinished() {
            const { correct, incorrect, blank, score } = calculateScore();
            const max = state.activeQuestions.length;
            const passed = (score / max) >= 0.5;

            const isExam = state.mode === 'exam';
            let explanationsHTML = '';
            
            if (isExam) {
                explanationsHTML = `
                <div class="mt-8 border-t border-slate-100 pt-8 text-left w-full max-h-[30rem] overflow-y-auto pr-2">
                    <h3 class="font-bold text-slate-800 mb-4">Revisión de Respuestas:</h3>
                    <div class="space-y-6">
                        ${state.activeQuestions.map((q, i) => {
                            const ans = state.userAnswers[q.id];
                            const isCorrect = ans === q.correctIndex;
                            const isBlank = ans === undefined;
                            
                            return `
                            <div class="p-4 rounded-xl border ${isCorrect ? 'border-green-200 bg-green-50' : (isBlank ? 'border-slate-200 bg-slate-50' : 'border-red-200 bg-red-50')}">
                                <div class="font-bold text-sm mb-2">${i+1}. ${q.question || q.q}</div>
                                <div class="text-xs mb-2">Tu respuesta: ${isBlank ? 'En blanco' : q.options[ans]} ${isCorrect ? '✅' : '❌'}</div>
                                ${!isCorrect && !isBlank ? `<div class="text-xs font-semibold text-green-700 mb-2">Correcta: ${q.options[q.correctIndex]}</div>` : ''}
                                ${q.explanation ? `<div class="text-xs text-slate-600 mt-2 pt-2 border-t border-slate-200"><strong>Explicación:</strong> ${q.explanation}</div>` : ''}
                            </div>
                            `
                        }).join('')}
                    </div>
                </div>`;
            }

            return `
                <div class="p-6 flex-grow flex items-center justify-center fade-in">
                    <div class="max-w-2xl w-full bg-white rounded-3xl shadow-xl overflow-hidden border border-slate-100 relative">
                        <div class="${passed ? 'bg-emerald-500' : 'bg-rose-500'} p-10 text-white text-center relative overflow-hidden">
                            <div class="relative z-10">
                                <div class="w-20 h-20 bg-white/20 rounded-full flex items-center justify-center mx-auto mb-4 backdrop-blur-sm">
                                    <i data-lucide="${passed ? 'trophy' : 'alert-circle'}" class="w-10 h-10 text-white"></i>
                                </div>
                                <h2 class="text-3xl font-black mb-1">${passed ? '¡Aprobado!' : 'No superado'}</h2>
                                <p class="text-white/80 font-medium text-sm">${subjectName}</p>
                            </div>
                        </div>

                        <div class="grid grid-cols-3 divide-x divide-slate-100 border-b border-slate-100">
                            <div class="p-6 text-center">
                                <div class="text-2xl font-black text-emerald-500 mb-1">${correct}</div>
                                <div class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Aciertos</div>
                            </div>
                            <div class="p-6 text-center">
                                <div class="text-2xl font-black text-rose-500 mb-1">${incorrect}</div>
                                <div class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Fallos</div>
                            </div>
                            <div class="p-6 text-center">
                                <div class="text-2xl font-black text-slate-400 mb-1">${blank}</div>
                                <div class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Blancos</div>
                            </div>
                        </div>

                        <div class="p-8 text-center bg-slate-50">
                            <div class="text-xs text-slate-400 font-bold uppercase tracking-widest mb-2">Puntuación Global</div>
                            <div class="text-5xl font-black text-slate-800 tracking-tight">${score.toFixed(1)} <span class="text-xl text-slate-400 font-normal">/ ${max}</span></div>
                        </div>
                        
                        ${isExam ? `<div class="px-8 pb-4">${explanationsHTML}</div>` : ''}

                        <div class="p-6 flex gap-3">
                            <button onclick="appMethods.restart()" class="flex-grow py-4 bg-slate-900 text-white rounded-xl font-bold shadow-lg shadow-slate-200 hover:bg-slate-800 transition-all flex items-center justify-center gap-2">
                                <i data-lucide="rotate-ccw" class="w-4 h-4"></i> Volver a Configurar
                            </button>
                            <button onclick="appMethods.backToSelector()" class="py-4 px-6 bg-slate-100 hover:bg-slate-200 text-slate-600 rounded-xl font-bold transition-all flex items-center justify-center gap-2">
                                <i data-lucide="log-out" class="w-4 h-4"></i> Salir
                            </button>
                        </div>
                    </div>
                </div>
            `;
        }

        function cleanText(str) {
            if (!str) return '';
            return str
                .toLowerCase()
                .normalize("NFD")
                .replace(/[\u0300-\u036f]/g, "")
                .replace(/[.,\/#!$%\^&\*;:{}=\-_`~()¡?¿]/g,"")
                .replace(/\s+/g, ' ')
                .trim();
        }

        function checkKeywordPresent(userAns, keyword) {
            if (!userAns) return false;
            const userClean = cleanText(userAns);
            const keywordClean = cleanText(keyword);
            return userClean.includes(keywordClean);
        }

        function renderTrainerPlaying() {
            const currentQ = state.activeQuestions[state.currentIndex];
            const progress = ((state.currentIndex + 1) / state.activeQuestions.length) * 100;
            const isChecked = state.trainerChecked[state.currentIndex] || false;
            const userAns = state.trainerAnswers[state.currentIndex] || '';

            let explanationHTML = '';
            if (isChecked) {
                const keywordsHTML = currentQ.keywords.map(kw => {
                    const present = checkKeywordPresent(userAns, kw);
                    return `
                        <span class="inline-flex items-center gap-1.5 px-3 py-1.5 rounded-xl font-bold text-xs border transition-all ${present ? 'bg-green-50 border-green-200 text-green-700' : 'bg-slate-50 border-slate-200 text-slate-400'}">
                            <i data-lucide="${present ? 'check-circle' : 'circle'}" class="w-3.5 h-3.5"></i>
                            ${kw}
                        </span>
                    `;
                }).join('');

                explanationHTML = `
                    <div class="mt-8 pt-6 border-t border-slate-100 space-y-6 fade-in">
                        <div class="space-y-2">
                            <span class="text-[10px] font-bold text-indigo-500 uppercase tracking-widest block">Respuesta Modelo</span>
                            <div class="p-5 bg-indigo-50/50 border border-indigo-100 rounded-2xl text-slate-700 text-sm leading-relaxed font-medium">
                                ${currentQ.model}
                            </div>
                        </div>

                        <div class="space-y-3">
                            <span class="text-[10px] font-bold text-slate-400 uppercase tracking-widest block">Conceptos clave a recordar</span>
                            <div class="flex flex-wrap gap-2">
                                ${keywordsHTML}
                            </div>
                        </div>

                        ${currentQ.page ? `
                        <div class="text-xs text-slate-400 font-bold flex items-center gap-1">
                            <i data-lucide="book-open" class="w-3.5 h-3.5"></i> Manual: Página ${currentQ.page}
                        </div>
                        ` : ''}
                    </div>
                `;
            }

            return `
                <div class="flex flex-col items-center p-4 w-full flex-grow fade-in">
                    <div class="w-full max-w-3xl mb-6 flex justify-between items-center text-slate-400">
                        <div class="flex flex-col">
                            <span class="text-[10px] font-black tracking-widest uppercase text-slate-300">${subjectName}</span>
                            <span class="text-sm font-bold text-slate-700">Entrenamiento ${state.currentIndex + 1} <span class="text-slate-300 font-normal">/ ${state.activeQuestions.length}</span></span>
                        </div>
                        <div class="flex items-center gap-2">
                            <div class="flex items-center gap-2 px-3 py-1 bg-slate-100 rounded-full text-slate-600 font-mono text-xs font-bold">
                                <i data-lucide="clock" class="w-3.5 h-3.5"></i>
                                <span>${formatTime(state.timeSpentSeconds)}</span>
                            </div>
                            <span class="px-3 py-1 rounded-full text-[10px] font-black tracking-wider border bg-amber-50 border-amber-200 text-amber-700">
                                MEMORIA ACTIVA
                            </span>
                        </div>
                    </div>

                    <div class="w-full max-w-3xl h-1.5 bg-slate-100 rounded-full mb-8 overflow-hidden">
                        <div class="h-full bg-slate-800 transition-all duration-500 ease-out" style="width: ${progress}%"></div>
                    </div>

                    <div class="w-full max-w-3xl bg-white rounded-3xl shadow-sm border border-slate-200 p-8 md:p-10 mb-6 relative">
                        <h2 class="text-lg md:text-xl font-bold text-slate-800 mb-6 leading-relaxed">${currentQ.q}</h2>
                        
                        <div class="space-y-3">
                            <label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest block">Redacta tu respuesta:</label>
                            <textarea id="trainer-textarea" 
                                oninput="appMethods.handleTrainerInput(this.value)" 
                                ${isChecked ? 'disabled' : ''} 
                                placeholder="Escribe aquí tu respuesta. Intenta incluir los conceptos más importantes..." 
                                class="w-full h-32 p-4 border border-slate-200 rounded-2xl text-slate-700 text-sm focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 outline-none resize-none transition-all ${isChecked ? 'bg-slate-50 text-slate-500 border-slate-150' : 'bg-white'}"
                            >${userAns}</textarea>
                        </div>

                        ${explanationHTML}
                    </div>

                    <div class="w-full max-w-3xl flex justify-between items-center gap-4">
                        <button onclick="appMethods.backToSelector()" 
                            class="flex items-center gap-2 px-5 py-3 rounded-xl font-bold text-slate-400 hover:text-slate-600 hover:bg-slate-100 transition-all text-sm">
                            <i data-lucide="log-out" class="w-4 h-4"></i> Salir
                        </button>
                        
                        ${!isChecked ? `
                            <button onclick="appMethods.checkTrainerAnswer()" 
                                class="flex items-center gap-2 px-8 py-3 bg-indigo-600 text-white rounded-xl font-bold shadow-lg shadow-indigo-100 hover:bg-indigo-700 transition-all text-sm">
                                <i data-lucide="eye" class="w-4 h-4"></i> Revelar y Comparar
                            </button>
                        ` : `
                            <button onclick="appMethods.nextTrainerQuestion()" 
                                class="flex items-center gap-2 px-8 py-3 bg-slate-900 text-white rounded-xl font-bold shadow-lg shadow-slate-200 hover:bg-slate-800 transition-all text-sm">
                                ${state.currentIndex === state.activeQuestions.length - 1 ? 'Finalizar' : 'Siguiente'} 
                                <i data-lucide="arrow-right" class="w-4 h-4"></i>
                            </button>
                        `}
                    </div>
                </div>
            `;
        }

        function renderTrainerFinished() {
            const max = state.activeQuestions.length;
            let totalKeywords = 0;
            let foundKeywords = 0;

            state.activeQuestions.forEach((q, idx) => {
                const ans = state.trainerAnswers[idx] || '';
                q.keywords.forEach(kw => {
                    totalKeywords++;
                    if (checkKeywordPresent(ans, kw)) {
                        foundKeywords++;
                    }
                });
            });

            const percent = totalKeywords > 0 ? Math.round((foundKeywords / totalKeywords) * 100) : 0;
            const passed = percent >= 50;

            return `
                <div class="p-6 flex-grow flex items-center justify-center fade-in">
                    <div class="max-w-2xl w-full bg-white rounded-3xl shadow-xl overflow-hidden border border-slate-100 relative">
                        <div class="${passed ? 'bg-emerald-500' : 'bg-slate-800'} p-10 text-white text-center relative overflow-hidden">
                            <div class="relative z-10">
                                <div class="w-20 h-20 bg-white/20 rounded-full flex items-center justify-center mx-auto mb-4 backdrop-blur-sm">
                                    <i data-lucide="${passed ? 'trophy' : 'activity'}" class="w-10 h-10 text-white"></i>
                                </div>
                                <h2 class="text-3xl font-black mb-1">${passed ? '¡Excelente!' : 'Entrenamiento Finalizado'}</h2>
                                <p class="text-white/80 font-medium text-sm">${subjectName}</p>
                            </div>
                        </div>

                        <div class="grid grid-cols-2 divide-x divide-slate-100 border-b border-slate-100">
                            <div class="p-6 text-center">
                                <div class="text-2xl font-black text-slate-800 mb-1">${formatTime(state.timeSpentSeconds)}</div>
                                <div class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Tiempo Transcurrido</div>
                            </div>
                            <div class="p-6 text-center">
                                <div class="text-2xl font-black text-indigo-600 mb-1">${foundKeywords} <span class="text-xs text-slate-400 font-normal">/ ${totalKeywords}</span></div>
                                <div class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Conceptos Clave Recordados</div>
                            </div>
                        </div>

                        <div class="p-8 text-center bg-slate-50">
                            <div class="text-xs text-slate-400 font-bold uppercase tracking-widest mb-2">Retención de Conceptos</div>
                            <div class="text-5xl font-black text-slate-800 tracking-tight">${percent}%</div>
                        </div>

                        <div class="p-6 flex gap-3">
                            <button onclick="appMethods.restart()" class="flex-grow py-4 bg-slate-900 text-white rounded-xl font-bold shadow-lg shadow-slate-200 hover:bg-slate-800 transition-all flex items-center justify-center gap-2">
                                <i data-lucide="rotate-ccw" class="w-4 h-4"></i> Volver a Configurar
                            </button>
                            <button onclick="appMethods.backToSelector()" class="py-4 px-6 bg-slate-100 hover:bg-slate-200 text-slate-600 rounded-xl font-bold transition-all flex items-center justify-center gap-2">
                                <i data-lucide="log-out" class="w-4 h-4"></i> Salir
                            </button>
                        </div>
                    </div>
                </div>
            `;
        }

        function renderFlashcardsPlaying() {
            const currentIdx = state.flashcardsProgress.current;
            const currentQ = state.activeQuestions[currentIdx];
            const progress = ((currentIdx + 1) / state.activeQuestions.length) * 100;

            const total = state.activeQuestions.length;
            const knownCount = state.flashcardsProgress.known.length;
            const reviewCount = state.flashcardsProgress.review.length;

            return `
                <div class="flex flex-col items-center p-4 w-full flex-grow fade-in">
                    <div class="w-full max-w-2xl mb-6 flex justify-between items-center text-slate-400">
                        <div class="flex flex-col">
                            <span class="text-[10px] font-black tracking-widest uppercase text-slate-300">${subjectName}</span>
                            <span class="text-sm font-bold text-slate-700">Ficha ${currentIdx + 1} <span class="text-slate-300 font-normal">/ ${total}</span></span>
                        </div>
                        <div class="flex items-center gap-1.5">
                            <span class="px-2.5 py-1 bg-green-50 border border-green-200 rounded-lg text-[10px] font-bold text-green-700 flex items-center gap-1">
                                <i data-lucide="check-circle" class="w-3 h-3"></i> Sé: ${knownCount}
                            </span>
                            <span class="px-2.5 py-1 bg-amber-50 border border-amber-200 rounded-lg text-[10px] font-bold text-amber-700 flex items-center gap-1">
                                <i data-lucide="help-circle" class="w-3 h-3"></i> Repasar: ${reviewCount}
                            </span>
                        </div>
                    </div>

                    <div class="w-full max-w-2xl h-1.5 bg-slate-100 rounded-full mb-8 overflow-hidden">
                        <div class="h-full bg-slate-800 transition-all duration-500 ease-out" style="width: ${progress}%"></div>
                    </div>

                    <!-- Flashcard 3D Wrapper -->
                    <div class="w-full max-w-2xl flashcard-container mb-8">
                        <div id="active-flashcard" onclick="appMethods.flipCard()" class="flashcard">
                            <!-- Front Side -->
                            <div class="flashcard-front">
                                ${currentQ.cat ? `
                                <span class="absolute top-4 left-6 text-[10px] font-bold uppercase tracking-widest text-indigo-500 bg-indigo-50/50 px-2 py-1 rounded-md border border-indigo-100/50">
                                    ${currentQ.cat}
                                </span>
                                ` : ''}
                                <span class="text-slate-300 text-xs font-bold uppercase tracking-widest mb-4">Pregunta</span>
                                <h2 class="text-lg md:text-xl font-bold text-center text-slate-800 leading-relaxed">${currentQ.q}</h2>
                                <span class="absolute bottom-4 text-[10px] font-bold text-slate-400 flex items-center gap-1">
                                    <i data-lucide="rotate-cw" class="w-3 h-3"></i> Haz clic para girar
                                </span>
                            </div>
                            <!-- Back Side -->
                            <div class="flashcard-back">
                                <span class="text-slate-300 text-xs font-bold uppercase tracking-widest mb-4">Respuesta</span>
                                <p class="text-sm font-medium text-center text-slate-700 leading-relaxed max-w-md">${currentQ.a}</p>
                                <span class="absolute bottom-4 text-[10px] font-bold text-slate-400 flex items-center gap-1">
                                    <i data-lucide="rotate-cw" class="w-3 h-3"></i> Haz clic para girar
                                </span>
                            </div>
                        </div>
                    </div>

                    <!-- Flashcard Actions -->
                    <div class="w-full max-w-2xl flex justify-between items-center gap-4">
                        <button onclick="appMethods.prevFlashcard()" ${(currentIdx === 0) ? 'disabled' : ''} 
                            class="flex items-center gap-2 px-5 py-3 rounded-xl font-bold transition-all text-sm ${(currentIdx === 0) ? 'opacity-0' : 'text-slate-400 hover:text-slate-600 hover:bg-slate-100'}">
                            <i data-lucide="arrow-left" class="w-4 h-4"></i> Anterior
                        </button>
                        
                        <div class="flex gap-2.5">
                            <button onclick="appMethods.markCardReview(${currentIdx})" 
                                class="flex items-center gap-1.5 px-5 py-3 bg-amber-50 border border-amber-200 text-amber-700 rounded-xl font-bold hover:bg-amber-100 transition-all text-xs">
                                <i data-lucide="help-circle" class="w-4 h-4"></i> Necesito Repasar
                            </button>
                            <button onclick="appMethods.markCardKnown(${currentIdx})" 
                                class="flex items-center gap-1.5 px-6 py-3 bg-emerald-600 text-white rounded-xl font-bold shadow-lg shadow-emerald-100 hover:bg-emerald-700 transition-all text-xs">
                                <i data-lucide="check-circle" class="w-4 h-4"></i> Me la sé
                            </button>
                        </div>
                    </div>
                </div>
            `;
        }

        function render() {
            const app = document.getElementById('app');
            if (state.gameState === 'select') {
                app.innerHTML = renderSelector();
            } else if (state.gameState === 'subject_folder') {
                app.innerHTML = renderSubjectFolder();
            } else if (state.gameState === 'menu') {
                app.innerHTML = renderMenu();
            } else if (state.gameState === 'playing') {
                if (state.studyMode === 'trainer') {
                    app.innerHTML = renderTrainerPlaying();
                } else if (state.studyMode === 'flashcards') {
                    app.innerHTML = renderFlashcardsPlaying();
                } else {
                    app.innerHTML = renderPlaying();
                }
            } else if (state.gameState === 'finished') {
                if (state.studyMode === 'trainer') {
                    app.innerHTML = renderTrainerFinished();
                } else {
                    app.innerHTML = renderFinished();
                }
            }
            lucide.createIcons();
            window.scrollTo(0, 0);
        }

        render();
    </script>
</body>
</html>
